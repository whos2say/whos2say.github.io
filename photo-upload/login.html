<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Photo Albums</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --border: #2f2f2f;
      --text: #ede8df;
      --text-muted: #8a8580;
      --accent: #c9a86c;
      --accent-hover: #d9bc82;
      --error: #e05c5c;
      --success: #5cad7c;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .brand {
      text-align: center;
      margin-bottom: 3rem;
    }

    .brand a {
      text-decoration: none;
      color: inherit;
    }

    .brand h1 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .brand p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.5rem;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 200ms ease-out, border-color 200ms ease-out;
    }

    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 300;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 200ms ease-out;
    }

    input:focus { border-color: var(--accent); }

    .btn {
      display: block;
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #111111;
      font-family: var(--font-body);
      font-size: 0.9375rem;
      font-weight: 500;
      padding: 0.875rem 1rem;
      cursor: pointer;
      transition: background 200ms ease-out, opacity 200ms ease-out;
      margin-top: 1.5rem;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .message {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      font-size: 0.875rem;
    }

    .message.error {
      background: rgba(224, 92, 92, 0.1);
      border: 1px solid rgba(224, 92, 92, 0.3);
      color: var(--error);
    }

    .message.success {
      background: rgba(92, 173, 124, 0.1);
      border: 1px solid rgba(92, 173, 124, 0.3);
      color: var(--success);
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      color: var(--text-muted);
      font-size: 0.875rem;
      text-decoration: none;
      transition: color 200ms ease-out;
    }

    .back-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="brand">
    <a href="index.html"><h1>Photo Albums</h1></a>
    <p>Sign in to upload and manage photos</p>
  </div>

  <div class="card">
    <div class="tabs" role="tablist">
      <button class="tab-btn active" role="tab" data-tab="login" aria-selected="true">Sign In</button>
      <button class="tab-btn" role="tab" data-tab="signup" aria-selected="false">Create Account</button>
    </div>

    <form id="auth-form" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn" id="submit-btn">Sign In</button>
    </form>

    <div class="message" id="message" role="alert" aria-live="polite" style="display:none"></div>
  </div>

  <a href="index.html" class="back-link">← Back to albums</a>

  <script type="module" src="js/login.js"></script>
</body>
</html>
