<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album — Photo Albums</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --border: #2f2f2f;
      --text: #ede8df;
      --text-muted: #8a8580;
      --accent: #c9a86c;
      --accent-hover: #d9bc82;
      --error: #e05c5c;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 400;
      padding: 0.5rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: color 200ms ease-out, border-color 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #111111;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1.125rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Main ── */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .album-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.5rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .album-title-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .album-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .lock-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(201, 168, 108, 0.1);
      border: 1px solid rgba(201, 168, 108, 0.25);
      border-radius: 20px;
      padding: 0.25rem 0.625rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .album-meta {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 0.375rem;
    }

    /* ── Photo Grid ── */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 0.75rem;
    }

    .photo-item {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      background: var(--surface);
      cursor: pointer;
      position: relative;
      animation: fadeIn 350ms ease-out both;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 350ms ease-out;
    }

    .photo-item:hover img {
      transform: scale(1.05);
    }

    .photo-item:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* Staggered animation — first 12 items */
    .photo-item:nth-child(1)  { animation-delay: 0ms; }
    .photo-item:nth-child(2)  { animation-delay: 40ms; }
    .photo-item:nth-child(3)  { animation-delay: 80ms; }
    .photo-item:nth-child(4)  { animation-delay: 120ms; }
    .photo-item:nth-child(5)  { animation-delay: 160ms; }
    .photo-item:nth-child(6)  { animation-delay: 200ms; }
    .photo-item:nth-child(7)  { animation-delay: 240ms; }
    .photo-item:nth-child(8)  { animation-delay: 280ms; }
    .photo-item:nth-child(9)  { animation-delay: 320ms; }
    .photo-item:nth-child(10) { animation-delay: 360ms; }
    .photo-item:nth-child(11) { animation-delay: 400ms; }
    .photo-item:nth-child(12) { animation-delay: 440ms; }
    .photo-item:nth-child(n+13) { animation-delay: 480ms; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 2.5rem;
    }

    .page-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: color 200ms ease-out, border-color 200ms ease-out;
    }

    .page-btn:hover:not(:disabled) { color: var(--text); border-color: var(--text-muted); }
    .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .page-info { color: var(--text-muted); font-size: 0.8125rem; min-width: 80px; text-align: center; }

    /* ── States ── */
    .status-msg {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .error-msg {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--error);
      font-size: 0.9375rem;
    }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0, 0, 0, 0.95);
      align-items: center;
      justify-content: center;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox-img {
      max-width: calc(100vw - 4rem);
      max-height: calc(100vh - 4rem);
      object-fit: contain;
      display: block;
      border-radius: 4px;
    }

    .lightbox-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      transition: background 200ms ease-out;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.15); }

    .lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text);
      transition: background 200ms ease-out;
    }

    .lightbox-nav:hover { background: rgba(255,255,255,0.15); }
    .lightbox-nav:disabled { opacity: 0.25; cursor: default; }
    .lightbox-prev { left: 1.25rem; }
    .lightbox-next { right: 1.25rem; }

    @media (max-width: 600px) {
      header { padding: 0.875rem 1.25rem; }
      main { padding: 1.5rem 1.25rem 3rem; }
      .album-title { font-size: 1.5rem; }
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.5rem; }
      .lightbox-nav { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="index.html" class="logo">Photo Albums</a>
    </div>
    <div class="header-actions">
      <a href="upload.html" class="btn-primary" id="upload-link" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload
      </a>
      <button class="btn-ghost" id="auth-btn">Sign In</button>
    </div>
  </header>

  <main>
    <div class="album-header" id="album-header" style="display:none">
      <div>
        <div class="album-title-row">
          <h1 class="album-title" id="album-title"></h1>
          <span class="lock-badge" id="lock-badge" style="display:none">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Private
          </span>
        </div>
        <p class="album-meta" id="album-meta"></p>
      </div>
    </div>

    <div class="status-msg" id="loading-msg">Loading photos…</div>
    <div class="photo-grid" id="photo-grid" style="display:none"></div>
    <div class="status-msg" id="empty-msg" style="display:none">No photos in this album yet.</div>
    <div class="error-msg" id="error-msg" style="display:none"></div>

    <div class="pagination" id="pagination" style="display:none">
      <button class="page-btn" id="prev-btn" disabled>← Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="next-btn">Next →</button>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close photo viewer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <button class="lightbox-nav lightbox-prev" id="lb-prev" aria-label="Previous photo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="" />
    <button class="lightbox-nav lightbox-next" id="lb-next" aria-label="Next photo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <script type="module" src="js/album.js"></script>
</body>
</html>
