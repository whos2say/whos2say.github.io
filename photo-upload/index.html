<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Albums</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --surface-hover: #242424;
      --border: #2f2f2f;
      --text: #ede8df;
      --text-muted: #8a8580;
      --accent: #c9a86c;
      --accent-hover: #d9bc82;
      --error: #e05c5c;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 400;
      padding: 0.5rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: color 200ms ease-out, border-color 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #111111;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1.125rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    .page-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
    }

    .page-header-text h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-header-text p {
      color: var(--text-muted);
      font-size: 0.9375rem;
      margin-top: 0.375rem;
    }

    .btn-new-album {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #111111;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.625rem 1.25rem;
      cursor: pointer;
      transition: background 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      flex-shrink: 0;
    }

    .btn-new-album:hover { background: var(--accent-hover); }

    /* ── Album Grid ── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .album-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 250ms ease-out, transform 250ms ease-out;
      animation: fadeUp 400ms ease-out both;
      position: relative;
    }

    .album-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .album-cover {
      aspect-ratio: 4/3;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 350ms ease-out;
    }

    .album-card:hover .album-cover img {
      transform: scale(1.04);
    }

    .album-cover-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .album-cover-empty svg {
      width: 48px;
      height: 48px;
      opacity: 0.4;
    }

    .album-badge {
      position: absolute;
      top: 0.625rem;
      right: 0.625rem;
      background: rgba(17, 17, 17, 0.82);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .album-badge svg { width: 11px; height: 11px; }

    .album-info {
      padding: 1rem 1.125rem 1.25rem;
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .album-info-text { flex: 1; min-width: 0; }

    .album-name {
      font-family: var(--font-display);
      font-size: 1.0625rem;
      font-weight: 400;
      margin-bottom: 0.375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    /* Privacy toggle button on card */
    .card-privacy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      padding: 0.3rem 0.45rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      transition: color 200ms ease-out, border-color 200ms ease-out, background 200ms ease-out;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 0.125rem;
      /* Stop click from navigating the card link */
      position: relative;
      z-index: 2;
    }

    .card-privacy-btn:hover { color: var(--text); border-color: var(--text-muted); }
    .card-privacy-btn.is-private { color: var(--accent); border-color: rgba(201,168,108,0.35); background: rgba(201,168,108,0.07); }
    .card-privacy-btn.is-private:hover { background: rgba(201,168,108,0.14); }
    .card-privacy-btn svg { width: 10px; height: 10px; }

    /* Staggered animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .album-card:nth-child(1)   { animation-delay: 0ms; }
    .album-card:nth-child(2)   { animation-delay: 60ms; }
    .album-card:nth-child(3)   { animation-delay: 120ms; }
    .album-card:nth-child(4)   { animation-delay: 180ms; }
    .album-card:nth-child(5)   { animation-delay: 240ms; }
    .album-card:nth-child(6)   { animation-delay: 300ms; }
    .album-card:nth-child(7)   { animation-delay: 360ms; }
    .album-card:nth-child(8)   { animation-delay: 400ms; }
    .album-card:nth-child(n+9) { animation-delay: 440ms; }

    /* ── States ── */
    .status-msg {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .error-msg {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--error);
      font-size: 0.9375rem;
    }

    /* ── Auth notice ── */
    .private-notice {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(201, 168, 108, 0.08);
      border: 1px solid rgba(201, 168, 108, 0.2);
      border-radius: var(--radius);
      padding: 0.625rem 1rem;
      font-size: 0.8125rem;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .private-notice a {
      color: var(--accent-hover);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.7);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      animation: modalIn 200ms ease-out both;
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.96) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 300;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 200ms ease-out;
    }

    .form-input:focus { border-color: var(--accent); }

    /* Toggle row */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
    }

    .toggle-label-group { display: flex; flex-direction: column; gap: 0.2rem; }

    .toggle-label-title {
      font-size: 0.9375rem;
      font-weight: 400;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toggle-label-desc {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 12px;
      cursor: pointer;
      transition: background 200ms ease-out;
    }

    .toggle-track::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #666;
      border-radius: 50%;
      transition: transform 200ms ease-out, background 200ms ease-out;
    }

    .toggle-switch input:checked + .toggle-track {
      background: rgba(201, 168, 108, 0.2);
      border: 1px solid rgba(201, 168, 108, 0.4);
    }

    .toggle-switch input:checked + .toggle-track::after {
      transform: translateX(20px);
      background: var(--accent);
    }

    .toggle-switch input:focus-visible + .toggle-track {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.75rem;
    }

    .modal-actions .btn-primary { flex: 1; justify-content: center; padding: 0.75rem 1rem; font-size: 0.9375rem; }
    .modal-actions .btn-ghost { flex-shrink: 0; }

    .modal-error {
      margin-top: 0.875rem;
      padding: 0.75rem 1rem;
      background: rgba(224, 92, 92, 0.1);
      border: 1px solid rgba(224, 92, 92, 0.3);
      border-radius: var(--radius);
      color: var(--error);
      font-size: 0.875rem;
    }

    @media (max-width: 600px) {
      header { padding: 0.875rem 1.25rem; }
      main { padding: 2rem 1.25rem 3rem; }
      .album-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
      .page-header { flex-direction: column; align-items: flex-start; }
      .page-header-text h2 { font-size: 1.5rem; }
      .logo { font-size: 1.125rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Photo Albums</a>
    <div class="header-actions">
      <a href="upload.html" class="btn-ghost" id="upload-link" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        Upload Photos
      </a>
      <button class="btn-ghost" id="auth-btn">Sign In</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <div class="page-header-text">
        <h2>Albums</h2>
        <p>Shared moments, captured.</p>
      </div>
      <button class="btn-new-album" id="new-album-btn" style="display:none" aria-label="Create new album">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Album
      </button>
    </div>

    <div class="private-notice" id="private-notice" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Private albums are hidden. <a href="login.html">Sign in</a> to see them.
    </div>

    <div class="status-msg" id="loading-msg">Loading albums…</div>
    <div class="album-grid" id="album-grid" style="display:none"></div>
    <div class="status-msg" id="empty-msg" style="display:none">No albums yet.</div>
    <div class="error-msg" id="error-msg" style="display:none"></div>
  </main>

  <!-- New Album Modal -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 class="modal-title" id="modal-title">New Album</h2>

      <div class="form-group">
        <label class="form-label" for="album-name-input">Album Name</label>
        <input class="form-input" type="text" id="album-name-input" placeholder="e.g. Summer 2025" maxlength="120" autocomplete="off" />
      </div>

      <div class="form-group">
        <div class="toggle-row">
          <div class="toggle-label-group">
            <span class="toggle-label-title">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              Private album
            </span>
            <span class="toggle-label-desc">Only visible to signed-in members</span>
          </div>
          <label class="toggle-switch" aria-label="Make album private">
            <input type="checkbox" id="is-private-input" />
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>

      <div class="modal-error" id="modal-error" style="display:none"></div>

      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-create">Create Album</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const albumGrid = document.getElementById('album-grid')
    const loadingMsg = document.getElementById('loading-msg')
    const emptyMsg = document.getElementById('empty-msg')
    const errorMsg = document.getElementById('error-msg')
    const authBtn = document.getElementById('auth-btn')
    const uploadLink = document.getElementById('upload-link')
    const newAlbumBtn = document.getElementById('new-album-btn')
    const privateNotice = document.getElementById('private-notice')

    // Modal
    const modalBackdrop = document.getElementById('modal-backdrop')
    const albumNameInput = document.getElementById('album-name-input')
    const isPrivateInput = document.getElementById('is-private-input')
    const modalCancel = document.getElementById('modal-cancel')
    const modalCreate = document.getElementById('modal-create')
    const modalError = document.getElementById('modal-error')

    // ── Auth state ──────────────────────────────────────────────
    const { data: { session } } = await supabase.auth.getSession()
    let user = session?.user ?? null

    function updateNav() {
      if (user) {
        authBtn.textContent = 'Sign Out'
        uploadLink.style.display = 'inline-flex'
        newAlbumBtn.style.display = 'inline-flex'
        privateNotice.style.display = 'none'
      } else {
        authBtn.textContent = 'Sign In'
        uploadLink.style.display = 'none'
        newAlbumBtn.style.display = 'none'
        privateNotice.style.display = 'inline-flex'
      }
    }

    authBtn.addEventListener('click', async () => {
      if (user) {
        await supabase.auth.signOut()
        user = null
        updateNav()
        loadAlbums()
      } else {
        window.location.href = 'login.html'
      }
    })

    supabase.auth.onAuthStateChange((_event, s) => {
      user = s?.user ?? null
      updateNav()
    })

    updateNav()

    // ── New Album Modal ──────────────────────────────────────────
    newAlbumBtn.addEventListener('click', openModal)
    modalCancel.addEventListener('click', closeModal)

    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) closeModal()
    })

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalBackdrop.classList.contains('open')) closeModal()
    })

    function openModal() {
      albumNameInput.value = ''
      isPrivateInput.checked = false
      modalError.style.display = 'none'
      modalBackdrop.classList.add('open')
      setTimeout(() => albumNameInput.focus(), 50)
    }

    function closeModal() {
      modalBackdrop.classList.remove('open')
    }

    albumNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') modalCreate.click()
    })

    modalCreate.addEventListener('click', async () => {
      const name = albumNameInput.value.trim()
      if (!name) {
        albumNameInput.focus()
        return
      }

      modalCreate.disabled = true
      modalCreate.textContent = 'Creating…'
      modalError.style.display = 'none'

      const isPrivate = isPrivateInput.checked

      const { data: album, error } = await supabase
        .from('albums')
        .insert({ name, is_private: isPrivate })
        .select('id, name, is_private, created_at')
        .single()

      modalCreate.disabled = false
      modalCreate.textContent = 'Create Album'

      if (error) {
        modalError.textContent = 'Failed to create album: ' + error.message
        modalError.style.display = 'block'
        return
      }

      closeModal()

      // Prepend the new card without reloading
      if (albumGrid.style.display === 'none') {
        albumGrid.style.display = 'grid'
        emptyMsg.style.display = 'none'
      }
      const card = buildCard(album)
      albumGrid.insertBefore(card, albumGrid.firstChild)
    })

    // ── Load albums ──────────────────────────────────────────────
    async function loadAlbums() {
      loadingMsg.style.display = 'block'
      albumGrid.style.display = 'none'
      emptyMsg.style.display = 'none'
      errorMsg.style.display = 'none'
      albumGrid.innerHTML = ''

      const { data: albums, error } = await supabase
        .from('albums')
        .select('id, name, is_private, created_at')
        .order('created_at', { ascending: false })

      if (error) {
        loadingMsg.style.display = 'none'
        errorMsg.textContent = 'Failed to load albums: ' + error.message
        errorMsg.style.display = 'block'
        return
      }

      const visible = user ? albums : albums.filter(a => !a.is_private)

      loadingMsg.style.display = 'none'

      if (!visible || visible.length === 0) {
        emptyMsg.style.display = 'block'
        return
      }

      albumGrid.style.display = 'grid'
      visible.forEach(album => {
        const card = buildCard(album)
        albumGrid.appendChild(card)
        fetchCover(album.id, card)
      })
    }

    function buildCard(album) {
      const wrap = document.createElement('div')
      wrap.className = 'album-card'
      wrap.style.animation = 'none' // already displayed

      const date = new Date(album.created_at).toLocaleDateString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric'
      })

      const lockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`
      const unlockIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`

      wrap.innerHTML = `
        <a href="album.html?id=${album.id}" class="album-cover-link" style="display:contents" aria-label="View album: ${escapeHtml(album.name)}">
          <div class="album-cover" id="cover-${album.id}">
            <div class="album-cover-empty" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
              </svg>
            </div>
            ${album.is_private ? `<div class="album-badge">${lockIcon} Private</div>` : ''}
          </div>
          <div class="album-info">
            <div class="album-info-text">
              <div class="album-name">${escapeHtml(album.name)}</div>
              <div class="album-meta">${date}</div>
            </div>
            ${user ? `<button class="card-privacy-btn ${album.is_private ? 'is-private' : ''}" data-album-id="${album.id}" data-private="${album.is_private}" aria-label="${album.is_private ? 'Make public' : 'Make private'}" title="${album.is_private ? 'Make public' : 'Make private'}">
              ${album.is_private ? lockIcon + ' Private' : unlockIcon + ' Public'}
            </button>` : ''}
          </div>
        </a>
      `

      // Privacy toggle button
      const privBtn = wrap.querySelector('.card-privacy-btn')
      if (privBtn) {
        privBtn.addEventListener('click', async (e) => {
          e.preventDefault()
          e.stopPropagation()
          const albumId = privBtn.dataset.albumId
          const currentlyPrivate = privBtn.dataset.private === 'true'
          const newPrivate = !currentlyPrivate

          privBtn.disabled = true

          const { error } = await supabase
            .from('albums')
            .update({ is_private: newPrivate })
            .eq('id', albumId)

          privBtn.disabled = false

          if (error) {
            alert('Failed to update: ' + error.message)
            return
          }

          // Update button state
          privBtn.dataset.private = String(newPrivate)
          privBtn.className = `card-privacy-btn ${newPrivate ? 'is-private' : ''}`
          privBtn.setAttribute('aria-label', newPrivate ? 'Make public' : 'Make private')
          privBtn.setAttribute('title', newPrivate ? 'Make public' : 'Make private')
          privBtn.innerHTML = newPrivate
            ? lockIcon + ' Private'
            : unlockIcon + ' Public'

          // Update badge on cover
          const cover = document.getElementById(`cover-${albumId}`)
          if (cover) {
            const existing = cover.querySelector('.album-badge')
            if (existing) existing.remove()
            if (newPrivate) {
              const badge = document.createElement('div')
              badge.className = 'album-badge'
              badge.innerHTML = lockIcon + ' Private'
              cover.appendChild(badge)
            }
          }
        })
      }

      fetchCover(album.id, wrap)
      return wrap
    }

    async function fetchCover(albumId, card) {
      const { data, error } = await supabase
        .from('photos')
        .select('file_path')
        .eq('album_id', albumId)
        .order('created_at', { ascending: true })
        .limit(1)

      if (error || !data || data.length === 0) return

      const { data: urlData } = supabase.storage.from('photos').getPublicUrl(data[0].file_path)
      const coverEl = document.getElementById(`cover-${albumId}`)
      if (!coverEl) return

      const img = document.createElement('img')
      img.src = urlData.publicUrl
      img.alt = ''
      img.loading = 'lazy'
      img.width = 400
      img.height = 300
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;'
      img.addEventListener('load', () => {
        coverEl.querySelector('.album-cover-empty')?.remove()
        coverEl.insertBefore(img, coverEl.firstChild)
      })
      coverEl.style.position = 'relative'
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    loadAlbums()
  </script>
</body>
</html>
