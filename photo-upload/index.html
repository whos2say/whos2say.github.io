<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Albums</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #111111;
      --surface: #1c1c1c;
      --surface-hover: #242424;
      --border: #2f2f2f;
      --text: #ede8df;
      --text-muted: #8a8580;
      --accent: #c9a86c;
      --accent-hover: #d9bc82;
      --error: #e05c5c;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --radius: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(17, 17, 17, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 1.375rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--text);
      text-decoration: none;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 400;
      padding: 0.5rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: color 200ms ease-out, border-color 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #111111;
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 1.125rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover { background: var(--accent-hover); }

    /* ── Main ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 4rem;
    }

    .page-header {
      margin-bottom: 2.5rem;
    }

    .page-header h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      color: var(--text);
    }

    .page-header p {
      color: var(--text-muted);
      font-size: 0.9375rem;
      margin-top: 0.375rem;
    }

    /* ── Album Grid ── */
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .album-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      transition: border-color 250ms ease-out, transform 250ms ease-out;
      animation: fadeUp 400ms ease-out both;
    }

    .album-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .album-cover {
      aspect-ratio: 4/3;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 350ms ease-out;
    }

    .album-card:hover .album-cover img {
      transform: scale(1.04);
    }

    .album-cover-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .album-cover-empty svg {
      width: 48px;
      height: 48px;
      opacity: 0.4;
    }

    .album-badge {
      position: absolute;
      top: 0.625rem;
      right: 0.625rem;
      background: rgba(17, 17, 17, 0.82);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 0.3rem 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .album-badge svg {
      width: 11px;
      height: 11px;
    }

    .album-info {
      padding: 1rem 1.125rem 1.25rem;
      flex: 1;
    }

    .album-name {
      font-family: var(--font-display);
      font-size: 1.0625rem;
      font-weight: 400;
      margin-bottom: 0.375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-meta {
      font-size: 0.8125rem;
      color: var(--text-muted);
    }

    /* Staggered animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .album-card:nth-child(1)  { animation-delay: 0ms; }
    .album-card:nth-child(2)  { animation-delay: 60ms; }
    .album-card:nth-child(3)  { animation-delay: 120ms; }
    .album-card:nth-child(4)  { animation-delay: 180ms; }
    .album-card:nth-child(5)  { animation-delay: 240ms; }
    .album-card:nth-child(6)  { animation-delay: 300ms; }
    .album-card:nth-child(7)  { animation-delay: 360ms; }
    .album-card:nth-child(8)  { animation-delay: 400ms; }
    .album-card:nth-child(n+9) { animation-delay: 440ms; }

    /* ── States ── */
    .status-msg {
      text-align: center;
      padding: 5rem 1rem;
      color: var(--text-muted);
      font-size: 0.9375rem;
    }

    .error-msg {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--error);
      font-size: 0.9375rem;
    }

    /* ── Auth notice ── */
    .private-notice {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(201, 168, 108, 0.08);
      border: 1px solid rgba(201, 168, 108, 0.2);
      border-radius: var(--radius);
      padding: 0.625rem 1rem;
      font-size: 0.8125rem;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .private-notice a {
      color: var(--accent-hover);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    @media (max-width: 600px) {
      header { padding: 0.875rem 1.25rem; }
      main { padding: 2rem 1.25rem 3rem; }
      .album-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; }
      .page-header h2 { font-size: 1.5rem; }
      .logo { font-size: 1.125rem; }
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Photo Albums</a>
    <div class="header-actions">
      <a href="upload.html" class="btn-primary" id="upload-link" style="display:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Upload
      </a>
      <button class="btn-ghost" id="auth-btn">Sign In</button>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2>Albums</h2>
      <p id="page-subtitle">Shared moments, captured.</p>
    </div>

    <div class="private-notice" id="private-notice" style="display:none">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      Private albums are hidden. <a href="login.html">Sign in</a> to see them.
    </div>

    <div class="status-msg" id="loading-msg">Loading albums…</div>
    <div class="album-grid" id="album-grid" style="display:none"></div>
    <div class="status-msg" id="empty-msg" style="display:none">No albums yet. Upload some photos to get started.</div>
    <div class="error-msg" id="error-msg" style="display:none"></div>
  </main>

  <script type="module">
    import { supabase } from './js/supabase.js'

    const albumGrid = document.getElementById('album-grid')
    const loadingMsg = document.getElementById('loading-msg')
    const emptyMsg = document.getElementById('empty-msg')
    const errorMsg = document.getElementById('error-msg')
    const authBtn = document.getElementById('auth-btn')
    const uploadLink = document.getElementById('upload-link')
    const privateNotice = document.getElementById('private-notice')

    // ── Auth state ──────────────────────────────────────────────
    const { data: { session } } = await supabase.auth.getSession()
    let user = session?.user ?? null

    function updateNav() {
      if (user) {
        authBtn.textContent = 'Sign Out'
        uploadLink.style.display = 'inline-flex'
        privateNotice.style.display = 'none'
      } else {
        authBtn.textContent = 'Sign In'
        uploadLink.style.display = 'none'
        privateNotice.style.display = 'inline-flex'
      }
    }

    authBtn.addEventListener('click', async () => {
      if (user) {
        await supabase.auth.signOut()
        user = null
        updateNav()
        loadAlbums()
      } else {
        window.location.href = 'login.html'
      }
    })

    supabase.auth.onAuthStateChange((_event, s) => {
      user = s?.user ?? null
      updateNav()
    })

    updateNav()

    // ── Load albums ──────────────────────────────────────────────
    async function loadAlbums() {
      loadingMsg.style.display = 'block'
      albumGrid.style.display = 'none'
      emptyMsg.style.display = 'none'
      errorMsg.style.display = 'none'
      albumGrid.innerHTML = ''

      const { data: albums, error } = await supabase
        .from('albums')
        .select('id, name, is_private, created_at')
        .order('created_at', { ascending: false })

      if (error) {
        loadingMsg.style.display = 'none'
        errorMsg.textContent = 'Failed to load albums: ' + error.message
        errorMsg.style.display = 'block'
        return
      }

      // Client-side: hide private albums from unauthenticated users
      // (belt-and-suspenders alongside RLS)
      const visible = user ? albums : albums.filter(a => !a.is_private)

      loadingMsg.style.display = 'none'

      if (!visible || visible.length === 0) {
        emptyMsg.style.display = 'block'
        return
      }

      albumGrid.style.display = 'grid'
      // Render cards; fetch covers concurrently
      visible.forEach((album, i) => {
        const card = buildCard(album)
        albumGrid.appendChild(card)
        fetchCover(album.id, card)
      })
    }

    function buildCard(album) {
      const card = document.createElement('a')
      card.href = `album.html?id=${album.id}`
      card.className = 'album-card'
      card.setAttribute('aria-label', `View album: ${album.name}`)

      const date = new Date(album.created_at).toLocaleDateString('en-US', {
        month: 'long', day: 'numeric', year: 'numeric'
      })

      card.innerHTML = `
        <div class="album-cover" id="cover-${album.id}">
          <div class="album-cover-empty" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
            </svg>
          </div>
          ${album.is_private ? `
          <div class="album-badge" aria-label="Private album">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            Private
          </div>` : ''}
        </div>
        <div class="album-info">
          <div class="album-name">${escapeHtml(album.name)}</div>
          <div class="album-meta">${date}</div>
        </div>
      `
      return card
    }

    async function fetchCover(albumId, card) {
      const { data, error } = await supabase
        .from('photos')
        .select('file_path')
        .eq('album_id', albumId)
        .order('created_at', { ascending: true })
        .limit(1)

      if (error || !data || data.length === 0) return

      const { data: urlData } = supabase.storage.from('photos').getPublicUrl(data[0].file_path)
      const coverEl = document.getElementById(`cover-${albumId}`)
      if (!coverEl) return

      const img = document.createElement('img')
      img.src = urlData.publicUrl
      img.alt = ''
      img.loading = 'lazy'
      img.width = 400
      img.height = 300
      img.style.position = 'absolute'
      img.style.inset = '0'
      coverEl.style.position = 'relative'
      img.addEventListener('load', () => {
        coverEl.querySelector('.album-cover-empty')?.remove()
        coverEl.insertBefore(img, coverEl.firstChild)
      })
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    }

    loadAlbums()
  </script>
</body>
</html>
