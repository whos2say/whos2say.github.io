<!doctype html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Slideshow</title>
  <link href="/assets/css/styles.css" rel="stylesheet" />
  <script src="/assets/js/theme.js" defer></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--color-dark-900);
      overflow: hidden;
    }

    .slideshow-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #000;
    }

    .slideshow-viewer {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .slideshow-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 35%;
      animation: fadeIn 0.3s ease-in-out;
      z-index: 1;
    }

    .slideshow-image.low-res {
      object-fit: contain;
      background: transparent;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .slideshow-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      padding: var(--space-6) var(--space-4);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      transition: opacity 0.5s ease;
      z-index: 10;
    }

    .slideshow-info {
      font-family: var(--font-body);
      color: var(--text-main);
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .slideshow-counter {
      background: color-mix(in srgb, var(--color-primary) 20%, transparent);
      border: 1px solid var(--color-primary);
      border-radius: var(--radius-sm);
      padding: var(--space-2) var(--space-3);
      color: var(--color-primary);
      font-weight: 600;
      font-family: var(--font-heading);
    }

    .slideshow-buttons {
      display: flex;
      gap: var(--space-3);
      align-items: center;
    }

    .slide-btn {
      background: color-mix(in srgb, var(--color-primary) 20%, transparent);
      border: 1px solid var(--color-primary);
      color: var(--text-main);
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      font-size: 0.9rem;
      text-transform: uppercase;
      min-width: 100px;
    }

    .slide-btn:hover {
      background: var(--color-primary);
      color: var(--color-dark-900);
      transform: translateY(-2px);
    }

    .slide-btn.play-pause {
      min-width: 80px;
    }

    .slide-btn.exit {
      background: color-mix(in srgb, #ff6b6b 20%, transparent);
      border-color: #ff6b6b;
      color: #ff6b6b;
    }

    .slide-btn.exit:hover {
      background: #ff6b6b;
      color: var(--color-dark-900);
    }

    .slideshow-top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
      padding: var(--space-4);
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    .slideshow-title {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
    }

    .slideshow-progress {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 4px;
      background: var(--color-primary);
      transition: width 0.5s linear;
      z-index: 5;
    }

    .empty-state {
      color: var(--text-main);
      text-align: center;
      font-family: var(--font-body);
    }

    .empty-state h2 {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      margin-bottom: var(--space-3);
    }

    @media (max-width: 768px) {
      .slideshow-controls {
        flex-direction: column;
        gap: var(--space-2);
      }

      .slide-btn {
        min-width: 80px;
        padding: var(--space-2) var(--space-3);
        font-size: 0.8rem;
      }

      .slideshow-counter {
        min-width: 120px;
      }
    }

    #collage-viewer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    .collage-grid {
      display: grid;
      width: 100%;
      height: 100%;
      gap: 4px;
      /* grid-template set dynamically per layout */
    }

    .collage-item {
      overflow: hidden;
      background: var(--color-dark-900);
      position: relative;
      animation: collageIn 0.45s ease both;
    }

    .collage-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: 50% 35%; /* face-bias fallback; JS overrides with precise focal_point */
    }

    .slideshow-bg {
      position: absolute;
      inset: -8%;
      background-size: cover;
      background-position: 50% 35%;
      filter: blur(22px) brightness(0.28) saturate(1.3);
      display: none;
      z-index: 0;
      pointer-events: none;
    }

    @keyframes collageIn {
      from { opacity: 0; transform: scale(1.04); }
      to   { opacity: 1; transform: scale(1); }
    }

    .audio-controls {
      position: absolute;
      top: 0;
      right: 0;
      background: linear-gradient(to left, rgba(0,0,0,0.9), transparent);
      padding: var(--space-4);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      z-index: 20;
    }

    .audio-player-small {
      background: color-mix(in srgb, var(--color-dark-800) 90%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-primary) 20%, transparent);
      border-radius: var(--radius-sm);
      padding: var(--space-2) var(--space-3);
      display: flex;
      align-items: center;
      gap: var(--space-2);
      max-width: 300px;
    }

    .audio-player-small audio {
      width: 200px;
      height: 24px;
      outline: none;
    }

    .audio-player-small button {
      background: color-mix(in srgb, var(--color-primary) 20%, transparent);
      border: 1px solid var(--color-primary);
      color: var(--color-primary);
      padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.18s ease;
    }

    .audio-player-small button:hover {
      background: var(--color-primary);
      color: var(--color-dark-900);
    }

    @media (max-width: 640px) {
      .slideshow-controls {
        padding: var(--space-3) var(--space-2);
        flex-wrap: wrap;
        gap: var(--space-2);
      }
      .slideshow-buttons {
        gap: var(--space-2);
      }
      .slide-btn {
        min-width: 52px;
        padding: 0.45rem 0.6rem;
        font-size: 0.72rem;
        letter-spacing: 0;
      }
      .slide-btn.play-pause { min-width: 68px; }
      .slideshow-counter {
        font-size: 0.78rem;
        padding: var(--space-1) var(--space-2);
      }
      .slideshow-title { font-size: 0.85rem; }
      .slideshow-top-bar { padding: var(--space-2) var(--space-2); }
    }
  </style>
</head>
<body>

<div class="slideshow-container">
  <div class="slideshow-top-bar">
    <h1 class="slideshow-title" id="slideshow-title">Album Slideshow</h1>
    <div class="audio-controls" id="audio-controls" style="display: none;">
      <div class="audio-player-small">
        <audio id="slideshow-audio" controls>
          Your browser does not support the audio element.
        </audio>
        <button id="audio-mute-btn" title="Mute audio">🔇</button>
      </div>
    </div>
    <a href="#" id="back-to-album" class="slide-btn" style="background: color-mix(in srgb, #51cf66 20%, transparent); border-color: #51cf66; color: #51cf66; min-width: 100px;">← Back</a>
  </div>

  <div class="slideshow-viewer">
    <div id="slideshow-bg" class="slideshow-bg"></div>
    <img id="slideshow-image" class="slideshow-image" alt="Slideshow photo" />
    <div id="collage-viewer" style="display: none;">
      <div id="collage-grid" class="collage-grid"></div>
    </div>
    <div id="empty-state" class="empty-state" style="display: none;">
      <h2>No Photos</h2>
      <p>This album doesn't have any photos yet.</p>
    </div>
  </div>

  <div class="slideshow-progress" id="slideshow-progress"></div>

  <div class="slideshow-controls">
    <div class="slideshow-info">
      <span class="slideshow-counter" id="photo-counter">1 / 1</span>
    </div>

    <div class="slideshow-buttons">
      <button class="slide-btn" id="prev-btn" title="Previous photo (← arrow)">← Prev</button>
      <button class="slide-btn play-pause" id="play-pause-btn" title="Play/Pause (spacebar)">▶ Play</button>
      <button class="slide-btn" id="next-btn" title="Next photo (→ arrow)">Next →</button>
      <button class="slide-btn" id="fullscreen-btn" title="Enter fullscreen (F)">⛶ Full Screen</button>
      <button class="slide-btn exit" id="exit-btn" title="Exit slideshow (Esc)">Exit</button>
    </div>
  </div>
</div>

<script type="module" src="/js/slideshow.js"></script>

</body>
</html>
