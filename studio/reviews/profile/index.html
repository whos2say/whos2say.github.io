<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<meta name="robots" content="noindex,nofollow"><title>Profile Review | Who's to Say Studio</title>
<link rel="stylesheet" href="/studio/assets/studio.css"></head><body><main class="studio-shell">
<header class="studio-header"><a class="studio-brand" href="/studio/reviews/">Staff Reviews</a><span class="studio-badge">Staff only</span></header>
<div id="review-detail-loading" class="studio-panel studio-status">Loading review…</div>
<section id="review-detail-locked" class="studio-panel" hidden><h1>Review unavailable</h1><p id="review-detail-error"></p></section>
<div id="review-detail" hidden><section class="studio-hero studio-hero--compact"><p class="studio-eyebrow">Participant identity</p><h1 id="review-participant"></h1><p id="review-registry"></p></section>
<section class="studio-panel"><h2>Public Identity</h2><pre id="review-identity"></pre></section>
<section class="studio-panel"><h2>Contact Preferences</h2><pre id="review-contact"></pre></section>
<section class="studio-panel"><h2>Social Profiles</h2><pre id="review-social"></pre></section>
<section class="studio-panel"><h2>Visibility choices</h2><pre id="review-visibility"></pre></section>
<section class="studio-panel"><h2>Consent</h2><pre id="review-consent"></pre></section>
<section class="studio-panel"><h2>Public-output preview</h2><div id="review-preview"></div></section>
<section class="studio-panel"><h2>Revision metadata</h2><p id="review-metadata"></p></section>
<section class="studio-panel"><h2>Review notes</h2><textarea id="review-notes" maxlength="2000"></textarea>
<div class="studio-editor-actions"><button id="review-request-changes" class="studio-button studio-button--secondary">Request Changes</button>
<button id="review-approve" class="studio-button">Approve and Publish</button><a class="studio-text-link" href="/studio/reviews/">Back to Queue</a></div>
<p id="review-message" class="studio-message" role="status"></p></section></div>
</main><script type="module" src="/studio/js/participant-profile-review-detail.js"></script></body></html>
