<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width">
<meta name="robots" content="noindex,nofollow"><title>Staff Reviews | Who's to Say Studio</title>
<link rel="stylesheet" href="/studio/assets/studio.css"></head><body><main class="studio-shell">
<header class="studio-header"><a class="studio-brand" href="/studio/">Who's to Say Studio</a><span class="studio-badge">Staff only</span></header>
<section class="studio-hero studio-hero--compact"><p class="studio-eyebrow">Profile publishing</p><h1>Staff Reviews</h1></section>
<div id="review-loading" class="studio-panel studio-status">Verifying staff authorization…</div>

<div id="review-workspace" hidden>
<section class="studio-panel"><h2>Review Queue</h2><div id="review-queue" class="studio-card-grid"></div></section>
<section class="studio-panel"><h2>Submitted</h2><div id="review-submitted" class="studio-card-grid"></div></section>
<section class="studio-panel"><h2>Changes Requested</h2><div id="review-changes" class="studio-card-grid"></div></section>
<section class="studio-panel"><h2>Approved History</h2><div id="review-approved" class="studio-card-grid"></div></section>
</div></main><script type="module" src="/studio/js/participant-profile-review-queue.js"></script></body></html>
