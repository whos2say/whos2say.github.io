  branch: main
  base_url: https://www.whostosay.org
  auth_endpoint: api/auth
  site_domain: www.whostosay.org

publish_mode: editorial_workflow

media_folder: assets/images/uploads
public_folder: /assets/images/uploads

locale: en

site_url: https://www.whostosay.org
display_url: https://www.whostosay.org

