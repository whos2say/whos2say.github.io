              { label: Title, name: title, widget: string },
              { label: Meta Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Kicker, name: kicker, widget: string },
              { label: Headline, name: title, widget: string },
              { label: Subhead (plain), name: subhead, widget: text },
              { label: Subhead (HTML), name: subheadHtml, widget: text, hint: "Use <br> for line breaks" },
