<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Who's to Say CMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CMS config lives one level up at /admin/config.yml (generated by build:decap-config). -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />

    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com;
        style-src 'self' 'unsafe-inline' https://unpkg.com;
        img-src 'self' data: blob: https:;
        font-src 'self' data: https:;
        connect-src 'self' https://api.github.com https://github.com https://raw.githubusercontent.com https://unpkg.com;
        frame-src 'self' https://github.com;
      "
    />
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="/admin/preview-templates/participant-page-preview.js"></script>
  </body>
</html>
