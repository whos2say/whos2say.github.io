<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Who's to Say CMS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- CMS config lives one level up at /admin/config.yml (generated by build:decap-config). -->
    <link href="/admin/config.yml" type="text/yaml" rel="cms-config-url" />

    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.jsdelivr.net;
        style-src 'self' 'unsafe-inline' https://unpkg.com;
        img-src 'self' data: blob: https:;
        font-src 'self' data: https:;
        connect-src 'self' https://api.github.com https://github.com https://raw.githubusercontent.com https://unpkg.com https://cdn.jsdelivr.net https://oiiluqrpzhujbvrblsko.supabase.co;
        frame-src 'self' https://github.com;
      "
    />
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script src="/admin/widgets/album-photo-selector.js?v=album-photo-selector-3"></script>
    <link rel="stylesheet" href="/admin/widgets/brand-palette-picker.css?v=brand-palette-picker-1" />
    <script src="/admin/widgets/brand-palette-picker.js?v=brand-palette-picker-1"></script>
    <script src="/admin/preview-templates/participant-page-preview.js?v=participant-preview-9"></script>
    <script src="/admin/preview-templates/brand-kit-preview.js?v=brand-kit-preview-1"></script>
    <script>
      (function initCmsAfterParticipantPreview(attempt) {
        if (!window.CMS) {
          window.setTimeout(function () { initCmsAfterParticipantPreview((attempt || 0) + 1); }, 50);
          return;
        }

        if (window.__participantPagesPreviewRegistered && window.__albumPhotoSelectorRegistered && window.__brandPalettePickerRegistered && window.__brandKitPreviewRegistered) {
          window.CMS.init();
          return;
        }

        if (attempt > 80) {
          console.warn('[CMS Init] Initializing after registration wait timeout', {
            selectorScriptLoaded: Boolean(window.__albumPhotoSelectorScriptLoaded),
            selectorRegistered: Boolean(window.__albumPhotoSelectorRegistered),
            selectorFailed: Boolean(window.__albumPhotoSelectorRegistrationFailed),
            previewRegistered: Boolean(window.__participantPagesPreviewRegistered),
            previewFailed: Boolean(window.__participantPagesPreviewRegistrationFailed),
            paletteRegistered: Boolean(window.__brandPalettePickerRegistered),
            paletteFailed: Boolean(window.__brandPalettePickerRegistrationFailed),
            brandKitPreviewRegistered: Boolean(window.__brandKitPreviewRegistered),
            brandKitPreviewFailed: Boolean(window.__brandKitPreviewRegistrationFailed)
          });
          window.CMS.init();
          return;
        }

        window.setTimeout(function () { initCmsAfterParticipantPreview((attempt || 0) + 1); }, 50);
      })(0);
    </script>
  </body>
</html>
