collections:
  - name: site
    label: Site Settings
    files:
      - label: Organization & Contact
        name: site
        file: content/site.json
        fields:
          - { label: Organization Name, name: organization, widget: object, fields: [
              { label: Display Name, name: name, widget: string },
              { label: EIN, name: ein, widget: string },
              { label: Tax Status Line, name: taxStatus, widget: string },
              { label: Location, name: location, widget: string }
            ]}
          - { label: Contact, name: contact, widget: object, fields: [
              { label: Email, name: email, widget: string },
              { label: Phone (display), name: phone, widget: string },
              { label: Phone (tel link), name: phoneTel, widget: string }
            ]}
          - { label: Donate Link, name: donate, widget: object, fields: [
              { label: URL, name: url, widget: string },
              { label: Label, name: label, widget: string }
            ]}
          - { label: Environment / Staging UI, name: environment, widget: object, fields: [
              { label: Show staging banner, name: showStagingBanner, widget: boolean, required: false, default: false, hint: "Nav visibility is controlled in Navigation / Menus (content/navigation.json)" }
            ]}

  - name: navigation
    label: Navigation / Menus
    files:
      - label: Site Navigation
        name: navigation
        file: content/navigation.json
        fields:
          - label: Editor guidance
            name: _comment
            widget: text
            required: false
          - label: Primary (header) navigation
            name: primary
            widget: list
            summary: "{{fields.label}} · {{fields.environment}}"
            hint: "Use environment staging for draft/compliance-sensitive pages. Do not promote Creative Workshops, Support Coordinators, pricing, or DDD language to production without review."
            fields:
              - label: Label
                name: label
                widget: string
              - label: URL
                name: href
                widget: string
              - label: Enabled
                name: enabled
                widget: boolean
                required: false
                default: true
              - label: Environment
                name: environment
                widget: select
                options:
                  - all
                  - staging
                  - production
                default: all
              - label: Order
                name: order
                widget: number
                default: 10
                value_type: int
              - label: External link
                name: external
                widget: boolean
                required: false
                default: false
              - label: Editor note
                name: note
                widget: text
                required: false
              - label: "Submenu items (optional — e.g. Programs paths)"
                name: children
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: URL
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: External link
                    name: external
                    widget: boolean
                    required: false
                    default: false
          - label: Footer navigation
            name: footer
            widget: list
            summary: "{{fields.label}} · {{fields.environment}}"
            fields:
              - label: Label
                name: label
                widget: string
              - label: URL
                name: href
                widget: string
              - label: Enabled
                name: enabled
                widget: boolean
                required: false
                default: true
              - label: Environment
                name: environment
                widget: select
                options:
                  - all
                  - staging
                  - production
                default: all
              - label: Order
                name: order
                widget: number
                default: 10
                value_type: int
              - label: External link
                name: external
                widget: boolean
                required: false
                default: false
              - label: Editor note
                name: note
                widget: text
                required: false
          - label: Page subnavs (in-page section links)
            name: subnavs
            widget: object
            hint: "Keys must match data-content-page on each HTML page (e.g. creative-workshops, story-brendan)."
            fields:
              - label: Creative Workshops
                name: creative-workshops
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: "URL or #anchor"
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: Editor note
                    name: note
                    widget: text
                    required: false
              - label: Support Coordinators
                name: support-coordinators
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: "URL or #anchor"
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: Editor note
                    name: note
                    widget: text
                    required: false
              - label: Brendan story
                name: story-brendan
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: "URL or #anchor"
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: Editor note
                    name: note
                    widget: text
                    required: false

  - name: homepage
    label: Homepage
    files:
      - label: Homepage
        name: homepage
        file: content/homepage.json
        fields:
          - { label: Page Title, name: meta, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Meta Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Kicker, name: kicker, widget: string },
              { label: Headline, name: title, widget: string },
              { label: Subhead (plain), name: subhead, widget: text },
              { label: Subhead (HTML), name: subheadHtml, widget: text, hint: "Use <br> for line breaks" },
              { label: Note, name: note, widget: text },
              { label: Legal Line (HTML), name: legalLine, widget: text }
            ]}
          - label: Hero Buttons
            name: actions
            widget: list
            fields:
              - label: Label
                name: label
                widget: string
              - label: URL
                name: href
                widget: string
              - label: Style
                name: style
                widget: select
                options:
                  - primary
                  - secondary
                  - ghost
              - label: External Link
                name: external
                widget: boolean
                required: false
                default: false
          - { label: Autism Acceptance Section, name: autismMonth, widget: object, fields: [
              { label: Show Section, name: enabled, widget: boolean, required: false, default: true },
              { label: Eyebrow, name: eyebrow, widget: string },
              { label: Title, name: title, widget: string },
              { label: Title Accent, name: titleAccent, widget: string },
              { label: Body (HTML), name: bodyHtml, widget: text },
              { label: Link Label, name: link, widget: object, fields: [
                  { label: Text, name: label, widget: string },
                  { label: URL, name: href, widget: string }
                ]}
            ]}

  - name: programs-index
    label: Programs (Index)
    files:
      - label: Programs Landing Page
        name: programs-index
        file: content/programs-index.json
        fields:
          - { label: Hero Title, name: hero, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text }
            ]}
          - { label: Grid Heading, name: gridHeading, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text }
            ]}
          - label: Program Cards
            name: programs
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Visible, name: visible, widget: boolean, required: false, default: true, hint: "Turn off to hide this program card from the public Programs page without deleting it." }
              - { label: Label, name: label, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: text }
              - { label: Page URL, name: href, widget: string }
              - { label: Card Image, name: image, widget: image }
          - { label: How Pathways Work, name: howPathways, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text },
              { label: Steps, name: steps, widget: list, fields: [
                  { label: Icon, name: icon, widget: string },
                  { label: Title, name: title, widget: string },
                  { label: Body, name: body, widget: text }
                ]}
            ]}

  - name: programs
    label: Programs (Detail)
    folder: content/programs
    extension: json
    format: json
    create: false
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Path Key, name: pathKey, widget: string, hint: "Matches data-path on program cards" }
      - { label: SEO, name: meta, widget: object, fields: [
          { label: Title, name: title, widget: string },
          { label: Description, name: description, widget: text }
        ]}
      - { label: Hero, name: hero, widget: object, fields: [
          { label: Breadcrumb, name: breadcrumb, widget: string },
          { label: Title, name: title, widget: string },
          { label: Subtitle, name: subtitle, widget: text },
          { label: Pills, name: pills, widget: list, field: { label: Pill, name: pill, widget: string } },
          { label: Best For, name: bestFor, widget: text },
          { label: Hero Image, name: image, widget: image }
        ]}
      - label: Content Sections
        name: sections
        widget: list
        fields:
          - { label: Section Title, name: title, widget: string }
          - label: Blocks
            name: blocks
            widget: list
            types:
              - label: Paragraph (HTML allowed)
                name: paragraph
                widget: object
                fields:
                  - { label: HTML, name: html, widget: text }
              - label: Subheading
                name: h3
                widget: object
                fields:
                  - { label: Text, name: text, widget: string }
              - label: Bullet List
                name: ul
                widget: object
                fields:
                  - { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
      - label: Sidebar
        name: sidebar
        widget: object
        fields:
          - label: Session Style
            name: sessionStyle
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
          - label: Get Started
            name: getStarted
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Prompt, name: prompt, widget: string }
              - { label: Primary Label, name: primaryLabel, widget: string }
              - { label: Primary URL, name: primaryHref, widget: string }
              - { label: Secondary Label, name: secondaryLabel, widget: string }
              - { label: Secondary URL, name: secondaryHref, widget: string }
          - label: Accordions (FAQs)
            name: accordions
            widget: list
            hint: "Coordinator summaries â€” review compliance language before publishing."
            fields:
              - { label: Summary, name: summary, widget: string }
              - { label: Open by Default, name: open, widget: boolean, required: false, default: false }
              - { label: Body HTML, name: blocks, widget: list, field: { label: Paragraph HTML, name: html, widget: text }, hint: "One paragraph per row; use block type paragraph in JSON for full fidelity." }

  - name: faqs
    label: FAQs
    files:
      - label: Site FAQs
        name: faqs
        file: content/faqs.json
        fields:
          - label: FAQ Items
            name: items
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string }, hint: "Use contact, creative-workshops, support-coordinators" }
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

  - name: contact
    label: Contact Page
    files:
      - label: Contact
        name: contact
        file: content/contact.json
        fields:
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text },
              { label: Pills, name: pills, widget: list, field: { label: Pill, name: pill, widget: string } }
            ]}
          - { label: Form, name: form, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text }
            ]}
          - { label: Sidebar, name: sidebar, widget: object, fields: [
              { label: Best For Items, name: bestForItems, widget: list, field: { label: Item, name: item, widget: string } }
            ]}

  - name: creative-workshops
    label: Public Pricing / Classes
    files:
      - label: Creative Workshops
        name: creative-workshops
        file: content/creative-workshops.json
        fields:
          - { label: SEO, name: meta, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Kicker, name: kicker, widget: string },
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text },
              { label: Pills, name: pills, widget: list, field: { label: Pill, name: pill, widget: string } }
            ]}
          - { label: Show section, name: workshopsEnabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." }
          - label: Workshops
            name: workshops
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: text }
          - { label: Pricing, name: pricing, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text },
              { label: Tiers, name: tiers, widget: list, fields: [
                  { label: Name, name: name, widget: string },
                  { label: Price, name: price, widget: string },
                  { label: Description, name: description, widget: text }
                ]}
            ]}
          - { label: Funding Note, name: fundingNote, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text, hint: "Use conditional funding language only" }
            ]}
          - { label: Final CTA, name: finalCta, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text },
              { label: Primary Label, name: primaryLabel, widget: string },
              { label: Primary URL, name: primaryHref, widget: string }
            ]}

  - name: support-coordinators
    label: Support Coordinator Copy
    files:
      - label: Support Coordinators
        name: support-coordinators
        file: content/support-coordinators.json
        fields:
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text }
            ]}
          - { label: What We Provide, name: whatWeProvide, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text },
              { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
            ]}
          - label: Sample Descriptions
            name: sampleDescriptions
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: text }
          - label: Invoice Descriptions
            name: invoiceDescriptions
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Body, name: body, widget: text }
          - { label: Funding Note, name: fundingNote, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text }
            ]}

  - name: participant-brand-kits
    label: Participant Brand Kits
    description: "Define participant identity, audience, message, voice, and constrained visual direction. Brand Kits cannot control routes, links, albums, layout, HTML, or CSS."
    folder: content/participant-brand-kits
    extension: json
    format: json
    create: false
    identifier_field: slug
    fields:
      - { label: Schema Version, name: schemaVersion, widget: number, value_type: int, default: 1 }
      - { label: Slug, name: slug, widget: string, hint: "Admin-owned participant identifier. This does not create a route." }
      - { label: Status, name: status, widget: select, options: [draft, in-review, approved], default: draft }
      - label: Brand Workshop Guide
        name: workshop
        widget: object
        hint: "Use this together. It is okay to skip an area, come back later, or ask staff for support."
        fields:
          - &workshop_area
            label: Brand Foundation Workshop
            name: brandFoundation
            widget: object
            fields:
              - { label: Include this workshop area, name: enabled, widget: boolean, default: true }
              - { label: Workshop status, name: status, widget: select, options: [{ label: Come back later, value: not-started }, { label: In progress, value: in-progress }, { label: Skip for now, value: skip-for-now }, { label: Needs staff help, value: needs-staff-help }, { label: Complete, value: complete }], default: not-started }
              - { label: How does this feel?, name: participantComfort, widget: select, options: [{ label: Comfortable, value: comfortable }, { label: Unsure, value: unsure }, { label: This feels too deep today, value: too-deep }, { label: Needs support, value: needs-support }], default: comfortable }
              - { label: Workshop notes, name: notes, widget: text, required: false, hint: "Capture questions, choices, or what to come back to later." }
          - <<: *workshop_area
            label: Audience and Message Workshop
            name: audienceMessage
          - <<: *workshop_area
            label: Voice and Language Workshop
            name: voiceLanguage
          - <<: *workshop_area
            label: Story and Invitations Workshop
            name: storyCta
          - <<: *workshop_area
            label: Photo and Visual Workshop
            name: photoVisual
          - <<: *workshop_area
            label: Colors and Design Workshop
            name: colorsDesign
      - { label: Brand Foundation, name: identity, widget: object, fields: [
          { label: Brand Name, name: brandName, widget: string },
          { label: Participant Name, name: participantName, widget: string },
          { label: Tagline, name: tagline, widget: string },
          { label: Short Bio, name: shortBio, widget: text },
          { label: Long Bio, name: longBio, widget: text }
        ]}
      - { label: Audience and Message, name: strategy, widget: object, fields: [
          { label: "What should people know about this participant?", name: purpose, widget: text, hint: "In one or two sentences, what is most important for a visitor to understand? For DJR: David is building his point of view as a photographer through practice, attention, and real moments." },
          { label: "Who is this page for?", name: primaryAudience, widget: list, hint: "Name the people you most want to reach. For DJR: families, athletes and teams, community partners, and creative collaborators.", field: { label: Person or group, name: audience, widget: string } },
          { label: Secondary Audiences, name: secondaryAudience, widget: list, required: false, field: { label: Audience, name: audience, widget: string } },
          { label: Key Message, name: keyMessage, widget: text },
          { label: Supporting Messages, name: supportingMessages, widget: list, field: { label: Message, name: message, widget: text } },
          { label: "What should people feel or do after seeing this?", name: desiredAudienceResponse, widget: text, hint: "Examples: feel welcomed, understand the participant's point of view, view the work, start a conversation, or make an appropriate invitation." }
        ]}
      - label: Voice and Language
        name: voice
        widget: object
        fields:
          - { label: Voice Summary, name: summary, widget: text }
          - label: Voice Traits
            name: traits
            widget: list
            hint: "Choose three or four qualities that sound like this participant. Examples: warm, direct, observant, playful, steady, bold. For each trait, describe what to do and what not to do."
            fields:
              - { label: "This participant sounds…", name: name, widget: string, hint: "One quality, such as observant, warm, direct, or playful." }
              - { label: "What does that sound like?", name: description, widget: text, hint: "Describe the quality in everyday language." }
              - { label: "Do this", name: do, widget: text, hint: "Give a concrete writing example. DJR example: describe a specific face, moment, light, or detail." }
              - { label: "Do not do this", name: dont, widget: text, hint: "Name language that would feel wrong. DJR example: do not make inflated claims or use a corporate tone." }
          - { label: Tone by Context, name: toneByContext, widget: object, fields: [
              { label: Introduction, name: introduction, widget: text },
              { label: Story, name: story, widget: text },
              { label: Invitation, name: invitation, widget: text },
              { label: Sensitive Topics, name: sensitiveTopics, widget: text }
            ]}
          - { label: "Words that sound like this participant", name: wordsToUse, widget: list, hint: "Add words or short phrases that feel natural. DJR examples: point of view, moment, attention, practice, connection.", field: { label: Word or phrase, name: word, widget: string } }
          - { label: "Words that do not fit or should not be used", name: wordsToAvoid, widget: list, hint: "Include language the participant dislikes, language that is inaccurate, and stereotypes or pity language.", field: { label: Word or phrase, name: word, widget: string } }
          - { label: Writing Rules, name: writingRules, widget: object, fields: [
              { label: Reading Level, name: readingLevel, widget: select, options: [plain, general, advanced], default: plain },
              { label: Sentence Style, name: sentenceStyle, widget: string },
              { label: Point of View, name: person, widget: select, options: [first-person, third-person, mixed] },
              { label: Accessibility Notes, name: accessibilityNotes, widget: list, field: { label: Note, name: note, widget: text } }
            ]}
      - label: Story and Calls to Action
        name: messaging
        widget: object
        fields:
          - { label: Origin Story, name: originStory, widget: text }
          - { label: Public Message, name: publicMessage, widget: text }
          - { label: Proof Points, name: proofPoints, widget: list, required: false, field: { label: Point, name: point, widget: text } }
          - { label: Advocacy Topics, name: advocacyTopics, widget: list, required: false, field: { label: Topic, name: topic, widget: text } }
          - { label: Personal Boundaries, name: personalBoundaries, widget: list, required: false, field: { label: Boundary, name: boundary, widget: text } }
          - label: Approved Calls to Action
            name: approvedCallsToAction
            widget: list
            hint: "Describe the invitation only. Destinations and URLs remain admin/template-owned."
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Label, name: label, widget: string }
              - { label: Intent, name: intent, widget: string }
              - { label: Description, name: description, widget: text }
          - { label: Claims to Avoid, name: claimsToAvoid, widget: list, field: { label: Claim, name: claim, widget: text } }
      - { label: Photo and Visual Direction, name: visualDirection, widget: object, fields: [
          { label: "What kinds of images feel right?", name: photoStyle, widget: object, hint: "Talk about people, moments, energy, framing, light, and what should be avoided. Images still come from the Media Hub.", fields: [
              { label: "Describe the overall image feeling", name: summary, widget: text, hint: "DJR example: documentary observation with cinematic energy and honest human moments." },
              { label: Subjects, name: subjects, widget: list, field: { label: Subject, name: subject, widget: string } },
              { label: Composition, name: composition, widget: list, field: { label: Direction, name: direction, widget: string } },
              { label: Lighting, name: lighting, widget: list, field: { label: Direction, name: direction, widget: string } },
              { label: Mood, name: mood, widget: list, field: { label: Mood, name: moodItem, widget: string } },
              { label: Avoid, name: avoid, widget: list, field: { label: Avoid, name: avoidItem, widget: string } }
            ]},
          { label: Color Mood, name: colorMood, widget: list, field: { label: Mood, name: mood, widget: string } },
          { label: "What should the page feel like visually?", name: designStyle, widget: list, hint: "Use feeling words rather than design jargon. DJR examples: cinematic, photography-first, confident, spacious, cool, focused.", field: { label: Visual feeling, name: style, widget: string } },
          { label: Accessibility Intent, name: accessibilityIntent, widget: text }
        ]}
      - label: Approved Design Choices
        name: designSystem
        widget: object
        hint: "Choose approved presets only. Raw CSS, arbitrary colors, fonts, and layout controls are not available."
        fields:
          - { label: Overall Preset, name: preset, widget: select, options: [documentary-warm, advocacy-editorial] }
          - { label: Color Palette Workshop, name: colors, widget: brand-palette-picker, hint: "Choose from curated, accessible palettes and preview how each choice feels. Raw color codes are not available." }
