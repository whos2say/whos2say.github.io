          - { label: No Match Message, name: noMatchMessage, widget: string }

      - label: Section Gallery Mapper - Legacy/Admin
        name: djr-section-gallery-map
        file: content/djr/section-gallery-map.json
        fields:
          - { label: Editor Guidance, name: _comment, widget: text, required: false, hint: "Legacy/admin fallback only. Use Participant Pages and /albums.html for participant section images." }
          - label: Section Mappings
            name: sections
            widget: list
            summary: "{{fields.label}} · {{fields.sourceType}}"
            hint: "Legacy/admin fallback only. Normal participant image management uses Participant Pages with Supabase album UUIDs from /albums.html."
            fields:
              - label: Webpage Section
                name: sectionId
                widget: select
                options:
                  - { label: "David's Story", value: story }
                  - { label: Featured Story, value: featured }
                  - { label: Services, value: services }
                  - { label: "Eye to Eye / Creative Feature", value: creative }
                  - { label: About David, value: about }
                  - { label: Bottom CTA, value: cta }
              - { label: Admin Label, name: label, widget: string }
              - { label: Show Mapping, name: enabled, widget: boolean, required: false, default: true }
              - label: Source Type
                name: sourceType
                widget: select
                options:
                  - { label: Photo Gallery App album, value: photoGallery }
                  - { label: Google Photos shared album, value: googlePhotos }
                default: photoGallery
              - { label: Photo Gallery App Album ID, name: photoGalleryAlbumId, widget: string, required: false }
              - { label: Google Photos Shared Album URL, name: googlePhotosAlbumUrl, widget: string, required: false }
              - { label: Card Title, name: title, widget: string }
              - { label: Card Description, name: description, widget: text, required: false }
              - { label: Cover Image, name: coverImage, widget: image, required: false }
              - { label: Button Label, name: buttonLabel, widget: string, default: "Open Album" }

      - label: Contact Page
        name: djr-contact
        file: content/djr/contact.json
        fields:
          - { label: Editor Guidance, name: _comment, widget: text, required: false }
          - { label: SEO, name: meta, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Eyebrow, name: eyebrow, widget: string },
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text }
            ]}
          - { label: Form Endpoint, name: formAction, widget: string }
          - { label: Session Types, name: sessionTypes, widget: list, field: { label: Option, name: option, widget: string } }
          - { label: Sidebar, name: sidebar, widget: object, fields: [
              { label: Availability Title, name: availabilityTitle, widget: string },
              { label: Availability Body, name: availabilityBody, widget: text },
              { label: Response Title, name: responseTitle, widget: string },
              { label: Response Body, name: responseBody, widget: text }
            ]}

  - name: stories
    label: Stories
    folder: content/stories
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    identifier_field: slug
    summary: "{{listing.title}} · {{type}} · {{status}}"
    media_folder: "../../assets/images/stories/{{slug}}"
    public_folder: "/assets/images/stories/{{slug}}"
    fields:
      - { label: Schema Version, name: schemaVersion, widget: hidden, default: 1, value_type: int }
      - { label: Story Slug, name: slug, widget: string, pattern: ['^[a-z0-9]+(?:-[a-z0-9]+)*$', "Use lowercase letters, numbers, and hyphens only."] }
      - label: Story Type
        name: type
        widget: select
        options:
          - { label: Participant Story, value: participant-story }
          - { label: Media Team Case Study, value: case-study }
      - label: Publication Status
        name: status
        widget: select
        options: [draft, published]
        default: draft
        hint: "Draft stories can be previewed at their route but are excluded from the public Stories index."
      - { label: Participant Volume, name: volume, widget: number, value_type: int, required: false, hint: "Required and unique for participant stories; leave empty for case studies." }
      - { label: Published Date, name: publishedAt, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - { label: Theme, name: theme, widget: object, fields: [
          { label: Accent Hex Color, name: accent, widget: string, pattern: ['^#[0-9a-fA-F]{6}$', "Use a six-digit hex color."] }
        ]}
      - { label: SEO, name: seo, widget: object, fields: [
          { label: Title, name: title, widget: string },
          { label: Description, name: description, widget: text },
          { label: Canonical URL, name: canonical, widget: string },
          { label: Social Image, name: image, widget: image }
        ]}
      - { label: Stories Index Card, name: listing, widget: object, fields: [
          { label: Title, name: title, widget: string },
          { label: Summary, name: summary, widget: text },
          { label: Label, name: label, widget: string },
          { label: Image, name: image, widget: image },
          { label: Image Alt Text, name: imageAlt, widget: string },
          { label: Sort Order, name: order, widget: number, value_type: int }
        ]}
      - { label: Hero, name: hero, widget: object, fields: [
          { label: Eyebrow, name: eyebrow, widget: string },
          { label: Title, name: title, widget: string },
          { label: Lead, name: lead, widget: text },
          { label: Image, name: image, widget: image },
          { label: Image Alt Text, name: imageAlt, widget: string },
          { label: Primary Action, name: primaryAction, widget: object, fields: [
              { label: Label, name: label, widget: string },
              { label: URL or Anchor, name: href, widget: string }
            ]}
        ]}
      - label: Reusable Sections
        name: sections
        widget: list
        types:
          - label: Rich Text
            name: rich-text
            widget: object
            fields:
              - { label: Anchor ID, name: id, widget: string, required: false }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: paragraph, widget: text } }
          - label: Image + Text
            name: image-text
            widget: object
            fields:
              - { label: Anchor ID, name: id, widget: string, required: false }
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Paragraphs, name: paragraphs, widget: list, field: { label: Paragraph, name: paragraph, widget: text } }
              - { label: Image, name: image, widget: image }
              - { label: Image Alt Text, name: imageAlt, widget: string }
              - { label: Caption, name: caption, widget: string, required: false }
              - { label: Placement, name: placement, widget: select, options: [left, right], default: left }
          - label: Quote
            name: quote
            widget: object
            fields:
              - { label: Quote, name: quote, widget: text }
              - { label: Attribution, name: attribution, widget: string }
              - { label: Role, name: role, widget: string, required: false }
          - label: Cards
            name: cards
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Lead, name: lead, widget: text, required: false }
              - { label: Cards, name: items, widget: list, fields: [
                  { label: Title, name: title, widget: string },
                  { label: Body, name: body, widget: text }
                ]}
          - label: Ordered Steps
            name: steps
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Lead, name: lead, widget: text, required: false }
              - { label: Steps, name: items, widget: list, fields: [
                  { label: Title, name: title, widget: string },
                  { label: Body, name: body, widget: text }
                ]}
          - label: Gallery
            name: gallery
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Lead, name: lead, widget: text, required: false }
              - { label: Images, name: items, widget: list, fields: [
                  { label: Image, name: image, widget: image },
                  { label: Image Alt Text, name: imageAlt, widget: string },
                  { label: Caption, name: caption, widget: string, required: false }
                ]}
          - label: Callout
            name: callout
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Action, name: action, widget: object, required: false, fields: [
                  { label: Label, name: label, widget: string },
                  { label: URL, name: href, widget: string }
                ]}
          - label: Final CTA
            name: final-cta
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string, required: false }
              - { label: Heading, name: heading, widget: string }
              - { label: Body, name: body, widget: text }
              - { label: Primary Action, name: primaryAction, widget: object, fields: [
                  { label: Label, name: label, widget: string },
                  { label: URL, name: href, widget: string }
                ]}
              - { label: Secondary Action, name: secondaryAction, widget: object, required: false, fields: [
                  { label: Label, name: label, widget: string },
                  { label: URL, name: href, widget: string }
                ]}

  - name: classes
    label: Public Classes (Schedule)
    hint: "Non-secret class metadata for the signup system. Calendar IDs and credentials are in env vars, not here."
    files:
      - label: Class Definitions
        name: classes
        file: content/classes.json
        fields:
          - label: Classes
            name: classes
            widget: list
            hint: "Class IDs must match VALID_CLASS_IDS in lib/google-class-services.js"
            fields:
              - { label: ID (slug), name: id, widget: string, hint: "e.g. digital-content-production" }
              - { label: Display Name, name: displayName, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Tuition Label, name: tuitionLabel, widget: string }
              - { label: Active, name: active, widget: boolean, default: true }
              - { label: Default Capacity, name: defaultCapacity, widget: number, default: 3, value_type: int }
              - { label: Calendar Title Aliases, name: aliases, widget: list, field: { label: Alias, name: alias, widget: string }, hint: "Lowercase substrings matched against Google Calendar event titles" }
