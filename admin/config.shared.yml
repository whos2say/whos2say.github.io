collections:
  - name: site
    label: Site Settings
    files:
      - label: Organization & Contact
        name: site
        file: content/site.json
        fields:
          - { label: Organization Name, name: organization, widget: object, fields: [
              { label: Display Name, name: name, widget: string },
              { label: EIN, name: ein, widget: string },
              { label: Tax Status Line, name: taxStatus, widget: string },
              { label: Location, name: location, widget: string }
            ]}
          - { label: Contact, name: contact, widget: object, fields: [
              { label: Email, name: email, widget: string },
              { label: Phone (display), name: phone, widget: string },
              { label: Phone (tel link), name: phoneTel, widget: string }
            ]}
          - { label: Donate Link, name: donate, widget: object, fields: [
              { label: URL, name: url, widget: string },
              { label: Label, name: label, widget: string }
            ]}
          - { label: Environment / Staging UI, name: environment, widget: object, fields: [
              { label: Show staging banner, name: showStagingBanner, widget: boolean, required: false, default: false, hint: "Nav visibility is controlled in Navigation / Menus (content/navigation.json)" }
            ]}

  - name: navigation
    label: Navigation / Menus
    files:
      - label: Site Navigation
        name: navigation
        file: content/navigation.json
        fields:
          - label: Editor guidance
            name: _comment
            widget: text
            required: false
          - label: Primary (header) navigation
            name: primary
            widget: list
            summary: "{{fields.label}} · {{fields.environment}}"
            hint: "Use environment staging for draft/compliance-sensitive pages. Do not promote Creative Workshops, Support Coordinators, pricing, or DDD language to production without review."
            fields:
              - label: Label
                name: label
                widget: string
              - label: URL
                name: href
                widget: string
              - label: Enabled
                name: enabled
                widget: boolean
                required: false
                default: true
              - label: Environment
                name: environment
                widget: select
                options:
                  - all
                  - staging
                  - production
                default: all
              - label: Order
                name: order
                widget: number
                default: 10
                value_type: int
              - label: External link
                name: external
                widget: boolean
                required: false
                default: false
              - label: Editor note
                name: note
                widget: text
                required: false
              - label: "Submenu items (optional — e.g. Programs paths)"
                name: children
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: URL
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: External link
                    name: external
                    widget: boolean
                    required: false
                    default: false
          - label: Footer navigation
            name: footer
            widget: list
            summary: "{{fields.label}} · {{fields.environment}}"
            fields:
              - label: Label
                name: label
                widget: string
              - label: URL
                name: href
                widget: string
              - label: Enabled
                name: enabled
                widget: boolean
                required: false
                default: true
              - label: Environment
                name: environment
                widget: select
                options:
                  - all
                  - staging
                  - production
                default: all
              - label: Order
                name: order
                widget: number
                default: 10
                value_type: int
              - label: External link
                name: external
                widget: boolean
                required: false
                default: false
              - label: Editor note
                name: note
                widget: text
                required: false
          - label: Page subnavs (in-page section links)
            name: subnavs
            widget: object
            hint: "Keys must match data-content-page on each HTML page (e.g. creative-workshops, story-brendan)."
            fields:
              - label: Creative Workshops
                name: creative-workshops
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: "URL or #anchor"
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: Editor note
                    name: note
                    widget: text
                    required: false
              - label: Support Coordinators
                name: support-coordinators
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: "URL or #anchor"
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: Editor note
                    name: note
                    widget: text
                    required: false
              - label: Brendan story
                name: story-brendan
                widget: list
                required: false
                fields:
                  - label: Label
                    name: label
                    widget: string
                  - label: "URL or #anchor"
                    name: href
                    widget: string
                  - label: Enabled
                    name: enabled
                    widget: boolean
                    required: false
                    default: true
                  - label: Environment
                    name: environment
                    widget: select
                    options:
                      - all
                      - staging
                      - production
                    default: all
                  - label: Order
                    name: order
                    widget: number
                    default: 10
                    value_type: int
                  - label: Editor note
                    name: note
                    widget: text
                    required: false

  - name: homepage
    label: Homepage
    files:
      - label: Homepage
        name: homepage
        file: content/homepage.json
        fields:
          - { label: Page Title, name: meta, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Meta Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Kicker, name: kicker, widget: string },
              { label: Headline, name: title, widget: string },
              { label: Subhead (plain), name: subhead, widget: text },
              { label: Subhead (HTML), name: subheadHtml, widget: text, hint: "Use <br> for line breaks" },
              { label: Note, name: note, widget: text },
              { label: Legal Line (HTML), name: legalLine, widget: text }
            ]}
          - label: Hero Buttons
            name: actions
            widget: list
            fields:
              - label: Label
                name: label
                widget: string
              - label: URL
                name: href
                widget: string
              - label: Style
                name: style
                widget: select
                options:
                  - primary
                  - secondary
                  - ghost
              - label: External Link
                name: external
                widget: boolean
                required: false
                default: false
          - { label: Autism Acceptance Section, name: autismMonth, widget: object, fields: [
              { label: Show Section, name: enabled, widget: boolean, required: false, default: true },
              { label: Eyebrow, name: eyebrow, widget: string },
              { label: Title, name: title, widget: string },
              { label: Title Accent, name: titleAccent, widget: string },
              { label: Body (HTML), name: bodyHtml, widget: text },
              { label: Link Label, name: link, widget: object, fields: [
                  { label: Text, name: label, widget: string },
                  { label: URL, name: href, widget: string }
                ]}
            ]}

  - name: programs-index
    label: Programs (Index)
    files:
      - label: Programs Landing Page
        name: programs-index
        file: content/programs-index.json
        fields:
          - { label: Hero Title, name: hero, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text }
            ]}
          - { label: Grid Heading, name: gridHeading, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text }
            ]}
          - label: Program Cards
            name: programs
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Visible, name: visible, widget: boolean, required: false, default: true, hint: "Turn off to hide this program card from the public Programs page without deleting it." }
              - { label: Label, name: label, widget: string }
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: text }
              - { label: Page URL, name: href, widget: string }
              - { label: Card Image, name: image, widget: image }
          - { label: How Pathways Work, name: howPathways, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text },
              { label: Steps, name: steps, widget: list, fields: [
                  { label: Icon, name: icon, widget: string },
                  { label: Title, name: title, widget: string },
                  { label: Body, name: body, widget: text }
                ]}
            ]}

  - name: programs
    label: Programs (Detail)
    folder: content/programs
    extension: json
    format: json
    create: false
    slug: "{{slug}}"
    identifier_field: slug
    fields:
      - { label: Slug, name: slug, widget: string }
      - { label: Path Key, name: pathKey, widget: string, hint: "Matches data-path on program cards" }
      - { label: SEO, name: meta, widget: object, fields: [
          { label: Title, name: title, widget: string },
          { label: Description, name: description, widget: text }
        ]}
      - { label: Hero, name: hero, widget: object, fields: [
          { label: Breadcrumb, name: breadcrumb, widget: string },
          { label: Title, name: title, widget: string },
          { label: Subtitle, name: subtitle, widget: text },
          { label: Pills, name: pills, widget: list, field: { label: Pill, name: pill, widget: string } },
          { label: Best For, name: bestFor, widget: text },
          { label: Hero Image, name: image, widget: image }
        ]}
      - label: Content Sections
        name: sections
        widget: list
        fields:
          - { label: Section Title, name: title, widget: string }
          - label: Blocks
            name: blocks
            widget: list
            types:
              - label: Paragraph (HTML allowed)
                name: paragraph
                widget: object
                fields:
                  - { label: HTML, name: html, widget: text }
              - label: Subheading
                name: h3
                widget: object
                fields:
                  - { label: Text, name: text, widget: string }
              - label: Bullet List
                name: ul
                widget: object
                fields:
                  - { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
      - label: Sidebar
        name: sidebar
        widget: object
        fields:
          - label: Session Style
            name: sessionStyle
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Items, name: items, widget: list, field: { label: Item, name: item, widget: string } }
          - label: Get Started
            name: getStarted
            widget: object
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Prompt, name: prompt, widget: string }
              - { label: Primary Label, name: primaryLabel, widget: string }
              - { label: Primary URL, name: primaryHref, widget: string }
              - { label: Secondary Label, name: secondaryLabel, widget: string }
              - { label: Secondary URL, name: secondaryHref, widget: string }
          - label: Accordions (FAQs)
            name: accordions
            widget: list
            hint: "Coordinator summaries â€” review compliance language before publishing."
            fields:
              - { label: Summary, name: summary, widget: string }
              - { label: Open by Default, name: open, widget: boolean, required: false, default: false }
              - { label: Body HTML, name: blocks, widget: list, field: { label: Paragraph HTML, name: html, widget: text }, hint: "One paragraph per row; use block type paragraph in JSON for full fidelity." }

  - name: faqs
    label: FAQs
    files:
      - label: Site FAQs
        name: faqs
        file: content/faqs.json
        fields:
          - label: FAQ Items
            name: items
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Tags, name: tags, widget: list, field: { label: Tag, name: tag, widget: string }, hint: "Use contact, creative-workshops, support-coordinators" }
              - { label: Question, name: question, widget: string }
              - { label: Answer, name: answer, widget: text }

  - name: contact
    label: Contact Page
    files:
      - label: Contact
        name: contact
        file: content/contact.json
        fields:
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text },
              { label: Pills, name: pills, widget: list, field: { label: Pill, name: pill, widget: string } }
            ]}
          - { label: Form, name: form, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text }
            ]}
          - { label: Sidebar, name: sidebar, widget: object, fields: [
              { label: Best For Items, name: bestForItems, widget: list, field: { label: Item, name: item, widget: string } }
            ]}

  - name: djr-page
    label: DJR Photography Page
    files:
      - label: DJR Photography
        name: djr
        file: content/djr.json
        fields:
          - { label: SEO, name: meta, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Kicker, name: kicker, widget: string },
              { label: Headline, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text }
            ]}
          - label: Page Sections
            name: sections
            widget: list
            summary: "{{fields.title}} · {{fields.type}}"
            hint: "Use album_id to reuse albums from DJR Gallery Albums. The album ID must match exactly, for example david-behind-the-lens."
            types:
              - label: Story Copy
                name: story
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string, hint: "Used for #anchor links, e.g. story" }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text }
              - label: Gallery Album Slideshow
                name: gallery_album
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Intro, name: body, widget: text, required: false }
                  - label: Album ID
                    name: album_id
                    widget: relation
                    collection: djr-gallery-albums
                    search_fields: [title, album_id]
                    value_field: album_id
                    display_fields: [title, album_id]
                    hint: "Choose the reusable album to show here."
              - label: Featured Image
                name: featured_image
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text, required: false }
                  - { label: Image, name: image, widget: image, media_folder: assets/images/uploads/djr, public_folder: /assets/images/uploads/djr }
                  - { label: Alt Text, name: alt, widget: string, hint: "Describe the image for people using screen readers." }
                  - { label: Caption, name: caption, widget: string, required: false }
              - label: Story Slideshow
                name: story_slideshow
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Intro, name: body, widget: text, required: false }
                  - label: Album ID
                    name: album_id
                    widget: relation
                    collection: djr-gallery-albums
                    search_fields: [title, album_id]
                    value_field: album_id
                    display_fields: [title, album_id]
              - label: Image Grid
                name: image_grid
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Intro, name: body, widget: text, required: false }
                  - label: Album ID
                    name: album_id
                    widget: relation
                    collection: djr-gallery-albums
                    search_fields: [title, album_id]
                    value_field: album_id
                    display_fields: [title, album_id]
              - label: Services
                name: services
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - label: Service Cards
                    name: items
                    widget: list
                    fields:
                      - { label: Title, name: title, widget: string }
                      - { label: Body, name: body, widget: text }
              - label: Contact CTA
                name: contact
                widget: object
                fields:
                  - { label: Section ID, name: id, widget: string }
                  - { label: Eyebrow, name: eyebrow, widget: string, required: false }
                  - { label: Title, name: title, widget: string }
                  - { label: Body, name: body, widget: text }
                  - { label: Button Label, name: button_label, widget: string }
                  - { label: Button URL, name: button_href, widget: string }

  - name: djr-gallery-albums
    label: DJR Gallery Albums
    folder: content/djr-albums
    extension: json
    format: json
    create: true
    slug: "{{album_id}}"
    identifier_field: title
    summary: "{{title}} · {{album_id}}"
    fields:
      - { label: Album ID, name: album_id, widget: string, hint: "Stable ID used on pages. Use lowercase letters, numbers, and hyphens, e.g. david-behind-the-lens." }
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Cover Image, name: cover_image, widget: image, required: false, media_folder: assets/images/uploads/djr, public_folder: /assets/images/uploads/djr, hint: "Used in hero/album previews. Upload DJR images here so they stay organized." }
      - label: Images
        name: images
        widget: list
        summary: "{{fields.caption}}"
        fields:
          - { label: Image, name: image, widget: image, media_folder: assets/images/uploads/djr, public_folder: /assets/images/uploads/djr }
          - { label: Alt Text, name: alt, widget: string, hint: "Required for accessibility. Describe what is visible, not SEO keywords." }
          - { label: Caption, name: caption, widget: string, required: false }
          - { label: Credit, name: credit, widget: string, required: false }
          - { label: Tags, name: tags, widget: list, required: false, field: { label: Tag, name: tag, widget: string }, hint: "Examples: behind-the-scenes, portrait, event, baseball, fundraiser" }
          - label: Orientation
            name: orientation
            widget: select
            required: false
            options:
              - landscape
              - portrait
              - square
              - panorama
              - mixed

  - name: djr-image-registry
    label: DJR Image Registry
    folder: content/djr-images
    extension: json
    format: json
    create: true
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} · {{participant}} · {{album}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Image, name: image, widget: image, media_folder: assets/images/uploads/djr, public_folder: /assets/images/uploads/djr, hint: "Upload reusable DJR images under assets/images/uploads/djr." }
      - { label: Participant, name: participant, widget: string, required: false, hint: "Example: David" }
      - label: Album
        name: album
        widget: relation
        collection: djr-gallery-albums
        search_fields: [title, album_id]
        value_field: album_id
        display_fields: [title, album_id]
        required: false
      - { label: Category, name: category, widget: string, required: false, hint: "Example: event, portrait, behind-the-scenes, service" }
      - { label: Tags, name: tags, widget: list, required: false, field: { label: Tag, name: tag, widget: string } }
      - { label: Alt Text, name: alt, widget: string, hint: "Describe the image for screen readers." }
      - { label: Caption, name: caption, widget: string, required: false }
      - { label: Usage Notes, name: usage_notes, widget: text, required: false, hint: "Where this image works best, consent notes, or pages where it is already used." }
      - label: Orientation
        name: orientation
        widget: select
        required: false
        options:
          - landscape
          - portrait
          - square
          - panorama
          - mixed

  - name: creative-workshops
    label: Public Pricing / Classes
    files:
      - label: Creative Workshops
        name: creative-workshops
        file: content/creative-workshops.json
        fields:
          - { label: SEO, name: meta, widget: object, fields: [
              { label: Title, name: title, widget: string },
              { label: Description, name: description, widget: text }
            ]}
          - { label: Hero, name: hero, widget: object, fields: [
              { label: Kicker, name: kicker, widget: string },
              { label: Title, name: title, widget: string },
              { label: Subtitle, name: subtitle, widget: text },
              { label: Pills, name: pills, widget: list, field: { label: Pill, name: pill, widget: string } }
            ]}
          - { label: Show section, name: workshopsEnabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." }
          - label: Workshops
            name: workshops
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Summary, name: summary, widget: text }
          - { label: Workshop Availability, name: classSchedule, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text },
              { label: Signup Enabled, name: signupEnabled, widget: boolean, required: false, default: false }
            ]}
          - { label: Pricing, name: pricing, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Intro, name: intro, widget: text },
              { label: Tiers, name: tiers, widget: list, fields: [
                  { label: Name, name: name, widget: string },
                  { label: Price, name: price, widget: string },
                  { label: Description, name: description, widget: text }
                ]}
            ]}
          - { label: Funding Note, name: fundingNote, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text, hint: "Use conditional funding language only" },
              { label: Link Label, name: linkLabel, widget: string },
              { label: Link URL, name: linkHref, widget: string }
            ]}
          - { label: Inclusive Section, name: inclusiveSection, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text }
            ]}
          - { label: How Sessions Work, name: howSessionsWork, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Steps, name: steps, widget: list, fields: [
                  { label: Title, name: title, widget: string },
                  { label: Body, name: body, widget: text }
                ]}
            ]}
          - { label: Maker Space, name: makerSpace, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text },
              { label: CTA Label, name: ctaLabel, widget: string },
              { label: CTA URL, name: ctaHref, widget: string },
              { label: CTA External Link, name: ctaExternal, widget: boolean, required: false, default: false }
            ]}
          - { label: Final CTA, name: finalCta, widget: object, fields: [
              { label: Show section, name: enabled, widget: boolean, required: false, default: true, hint: "Turn off to hide this section from the public page without deleting its content." },
              { label: Title, name: title, widget: string },
              { label: Body, name: body, widget: text },
              { label: Primary Label, name: primaryLabel, widget: string },
              { label: Primary URL, name: primaryHref, widget: string },
