<!doctype html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Albums — Who's 2 Say Foundation</title>
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Who's 2 Say Foundation" />
  <meta property="og:title"       content="Photo Albums — Who's 2 Say Foundation" />
  <meta property="og:description" content="Browse photo albums from Who's 2 Say Foundation — celebrating inclusion and our amazing community." />
  <meta property="og:url"         content="https://whostosay.org/albums.html" />
  <meta property="og:image"       content="https://whostosay.org/assets/images/W2S_Campaign.jpg" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="Photo Albums — Who's 2 Say Foundation" />
  <meta name="twitter:description" content="Browse photo albums from Who's 2 Say Foundation — celebrating inclusion and our amazing community." />
  <meta name="twitter:image"      content="https://whostosay.org/assets/images/W2S_Campaign.jpg" />
  <link href="/assets/css/styles.css" rel="stylesheet" />
  <script src="/assets/js/theme.js" defer></script>
  <link href="/assets/css/photo-album.css" rel="stylesheet" />
</head>
<body class="photo-album-page albums-page">
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="header-inner">
    <a aria-label="Who's to Say ? Foundation Home" class="brand" href="/">
      <img alt="Who's to Say ? Foundation logo (dark)" class="brand-logo logo-dark" src="/assets/images/logo-white-dark.png"/>
      <img alt="Who's to Say ? Foundation logo (light)" class="brand-logo logo-light" src="/assets/images/logo-black-light.png"/>
    </a>
    <nav aria-label="Primary navigation" class="site-nav">
      <a class="nav-link" data-nav="home" href="/">Home</a>
      <a class="nav-link" href="/programs.html">Programs</a>
      <a class="nav-link" href="/contact.html">Contact</a>
    </nav>
    <div class="header-actions">
      <button aria-label="Toggle theme" aria-pressed="false" class="theme-toggle" type="button"></button>
    </div>
  </div>
</header>

<main id="main">
  <div class="albums-header">
    <div class="albums-header-inner">
      <h1 id="gallery-title">Photo Albums</h1>
      <a href="/multi-slideshow.html" class="btn btn-primary" style="background: color-mix(in srgb, #a855f7 20%, transparent); border-color: #a855f7; color: #a855f7; white-space: nowrap;">🎬 Multi Slideshow</a>
      <div id="auth-header-action"><a href="/login.html" class="btn btn-primary">Sign In</a></div>
    </div>
  </div>

  <!-- Assign Owner Modal (admin only) -->
  <div id="assign-owner-modal" class="assign-modal" role="dialog" aria-modal="true">
    <div class="assign-modal-inner">
      <button class="assign-modal-close" id="ao-close" aria-label="Close">&times;</button>
      <h2>Assign Owner</h2>
      <p class="assign-modal-subtitle" id="ao-subtitle"></p>
      <div class="assign-info-row">
        <span class="assign-info-label">Current:</span>
        <span class="assign-info-value" id="ao-current">Unassigned</span>
        <button class="assign-remove-btn" id="ao-remove-btn">Remove</button>
      </div>
      <div class="assign-input-row">
        <input type="email" id="ao-email" list="known-users-datalist" placeholder="user@example.com" />
        <button class="btn btn-primary" id="ao-assign-btn" style="white-space:nowrap">Assign</button>
      </div>
      <p class="assign-modal-msg" id="ao-msg"></p>
    </div>
  </div>

  <!-- Manage Contributors Modal (admin only) -->
  <div id="contributors-modal" class="assign-modal" role="dialog" aria-modal="true">
    <div class="assign-modal-inner">
      <button class="assign-modal-close" id="cm-close" aria-label="Close">&times;</button>
      <h2>Contributors</h2>
      <p class="assign-modal-subtitle" id="cm-subtitle"></p>
      <div id="cm-list" class="cm-list"></div>
      <div class="assign-input-row">
        <input type="email" id="cm-email" list="known-users-datalist" placeholder="Add contributor by email" />
        <button class="btn btn-primary" id="cm-add-btn" style="white-space:nowrap">Add</button>
      </div>
      <p class="assign-modal-msg" id="cm-msg"></p>
    </div>
  </div>

  <datalist id="known-users-datalist"></datalist>

  <div class="albums-container">
    <div class="albums-grid" id="albums-grid">
      <div id="albums-empty" class="albums-empty" style="grid-column: 1 / -1;">
        <p>Loading albums...</p>
      </div>
    </div>

    <div id="create-album-section" class="create-album-section" style="display: none;">
      <h2>Create New Album</h2>
      <p>Start a new collection of photos</p>
      <form id="create-album-form" class="album-form">
        <input id="album-name-input" type="text" placeholder="Album name" required />
        <label class="album-privacy-toggle" title="Private albums are only visible to signed-in members">
          <input type="checkbox" id="album-private-checkbox" />
          <span class="album-privacy-label">
            <span class="lock-icon">🔒</span> Private album
            <span class="privacy-hint">— hidden from public visitors</span>
          </span>
        </label>
        <button type="submit" class="btn btn-primary">Create Album</button>
      </form>
      <div id="create-message"></div>
    </div>

    <div id="admin-users-panel" class="admin-users-panel" style="display:none">
      <h2>Registered Users</h2>
      <div id="admin-users-list"><p class="users-empty">Loading…</p></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  © <span id="year"></span> Who's to Say ? Foundation
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script type="module" src="/js/albums-index.js"></script>
</body>
</html>
