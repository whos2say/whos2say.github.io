<!doctype html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Albums — Who's 2 Say Foundation</title>
  <meta property="og:type"        content="website" />
  <meta property="og:site_name"   content="Who's 2 Say Foundation" />
  <meta property="og:title"       content="Photo Albums — Who's 2 Say Foundation" />
  <meta property="og:description" content="Browse photo albums from Who's 2 Say Foundation — celebrating inclusion and our amazing community." />
  <meta property="og:url"         content="https://whostosay.org/albums.html" />
  <meta property="og:image"       content="https://whostosay.org/assets/images/W2S_Campaign.jpg" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="Photo Albums — Who's 2 Say Foundation" />
  <meta name="twitter:description" content="Browse photo albums from Who's 2 Say Foundation — celebrating inclusion and our amazing community." />
  <meta name="twitter:image"      content="https://whostosay.org/assets/images/W2S_Campaign.jpg" />
  <link href="/assets/css/styles.css" rel="stylesheet" />
  <script src="/assets/js/theme.js" defer></script>
  <style>
    .albums-header {
      padding: var(--space-6) var(--space-3);
      margin-bottom: var(--space-5);
      border-bottom: 1px solid color-mix(in srgb, var(--color-primary) 15%, transparent);
    }

    .albums-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
    }

    .albums-header h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin: 0;
      flex: 1;
    }

    .albums-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--space-3) var(--space-6);
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }

    .album-card {
      background: color-mix(in srgb, var(--color-dark-800) 95%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-primary) 20%, transparent);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      transition: all 0.18s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      animation: fadeInScale 0.6s ease both;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .album-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(99, 245, 239, 0.15);
      border-color: color-mix(in srgb, var(--color-primary) 40%, transparent);
    }

    .album-cover {
      width: 100%;
      height: 160px;
      background: var(--color-dark-900);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .album-card:hover .album-cover img {
      transform: scale(1.05);
    }

    .album-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, color-mix(in srgb, var(--color-primary) 10%, var(--color-dark-900)), color-mix(in srgb, var(--color-primary) 5%, var(--color-dark-800)));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
    }

    .album-info {
      padding: var(--space-4);
    }

    .album-card h3 {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin: 0 0 var(--space-2) 0;
      word-break: break-word;
    }

    .album-card p {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0 0 var(--space-3) 0;
      flex: 1;
    }

    .album-card a {
      color: var(--color-primary);
      text-decoration: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.18s ease;
    }

    .album-card a:hover {
      color: #a0fdf9;
    }

    .albums-empty {
      text-align: center;
      padding: var(--space-8) var(--space-3);
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .albums-empty p {
      font-size: 1.1rem;
      margin-bottom: var(--space-4);
    }

    .create-album-section {
      margin-top: var(--space-8);
      padding: var(--space-6);
      border: 2px dashed color-mix(in srgb, var(--color-primary) 30%, transparent);
      border-radius: var(--radius-md);
      text-align: center;
      background: color-mix(in srgb, var(--color-primary) 3%, var(--color-dark-900));
    }

    .create-album-section h2 {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: var(--space-3);
    }

    .create-album-section p {
      font-family: var(--font-body);
      color: var(--text-muted);
      margin-bottom: var(--space-4);
    }

    .album-form {
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .album-form input {
      padding: var(--space-2) var(--space-3);
      border: 1px solid color-mix(in srgb, var(--color-primary) 30%, transparent);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--color-dark-900) 95%, transparent);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.18s ease;
    }

    .album-form input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 10%, transparent);
    }

    .album-form input::placeholder {
      color: var(--text-muted);
    }

    .album-form button {
      margin-top: var(--space-2);
    }

    .album-delete-btn {
      margin-top: var(--space-2);
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: color-mix(in srgb, #ff6b6b 10%, transparent);
      border: 1px solid #ff6b6b;
      border-radius: var(--radius-sm);
      color: #ff6b6b;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      text-transform: uppercase;
    }

    .album-delete-btn:hover {
      background: #ff6b6b;
      color: var(--color-dark-900);
    }

    .btn-create-first {
      margin-top: var(--space-4);
      font-size: 1.1rem;
      padding: var(--space-3) var(--space-6);
    }

    .title-size-btns {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-shrink: 0;
    }

    .title-size-btn {
      width: 26px;
      height: 26px;
      border-radius: var(--radius-sm);
      border: 1px solid color-mix(in srgb, var(--color-primary) 25%, transparent);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .title-size-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: color-mix(in srgb, var(--color-primary) 10%, transparent);
    }

    .title-size-btn.active {
      border-color: var(--color-primary);
      background: color-mix(in srgb, var(--color-primary) 20%, transparent);
      color: var(--color-primary);
    }

    /* ── Album drag-to-reorder (admin only) ── */
    .album-card.dragging {
      opacity: 0.35;
      transform: scale(0.96);
    }

    .album-card.drag-over {
      border-color: var(--color-primary) !important;
      box-shadow: 0 0 24px color-mix(in srgb, var(--color-primary) 40%, transparent) !important;
      transform: translateY(-4px) scale(1.02);
    }

    .album-drag-handle {
      position: absolute;
      bottom: var(--space-2);
      right: var(--space-2);
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      cursor: grab;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius-sm);
      padding: 2px 5px;
      letter-spacing: -1px;
    }

    .album-card:hover .album-drag-handle {
      opacity: 1;
    }

    /* Admin: album assignment section on cards */
    .admin-assignment {
      margin-top: var(--space-3);
      padding-top: var(--space-3);
      border-top: 1px solid color-mix(in srgb, var(--color-primary) 15%, transparent);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .owner-row, .contrib-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      font-size: 0.8rem;
      font-family: var(--font-body);
    }

    .owner-label, .contrib-label {
      color: var(--text-muted);
      flex-shrink: 0;
      min-width: 5.5rem;
    }

    .owner-email-display, .contrib-count-display {
      flex: 1;
      color: var(--color-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.78rem;
    }

    .assign-btn, .contrib-btn {
      flex-shrink: 0;
      padding: 2px 8px;
      border: 1px solid color-mix(in srgb, var(--color-primary) 40%, transparent);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--color-primary);
      font-size: 0.7rem;
      font-weight: 700;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .assign-btn:hover, .contrib-btn:hover {
      background: color-mix(in srgb, var(--color-primary) 15%, transparent);
      border-color: var(--color-primary);
    }

    /* Assignment modals */
    .assign-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .assign-modal.show { display: flex; }

    .assign-modal-inner {
      background: var(--color-dark-800);
      border: 1px solid color-mix(in srgb, var(--color-primary) 30%, transparent);
      border-radius: var(--radius-md);
      padding: var(--space-6);
      max-width: 440px;
      width: calc(100% - 2rem);
      position: relative;
    }

    .assign-modal-inner h2 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin: 0 0 var(--space-1) 0;
    }

    .assign-modal-subtitle {
      font-family: var(--font-body);
      font-size: 0.82rem;
      color: var(--text-muted);
      margin: 0 0 var(--space-4) 0;
    }

    .assign-modal-close {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 4px;
    }

    .assign-modal-close:hover { color: var(--text-main); }

    .assign-info-row {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: color-mix(in srgb, var(--color-primary) 5%, var(--color-dark-900));
      border-radius: var(--radius-sm);
      margin-bottom: var(--space-4);
      font-family: var(--font-body);
      font-size: 0.85rem;
    }

    .assign-info-label { color: var(--text-muted); flex-shrink: 0; }
    .assign-info-value { color: var(--color-primary); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .assign-input-row {
      display: flex;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .assign-input-row input[type="email"] {
      flex: 1;
      padding: var(--space-2) var(--space-3);
      border: 1px solid color-mix(in srgb, var(--color-primary) 30%, transparent);
      border-radius: var(--radius-sm);
      background: var(--color-dark-900);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.9rem;
    }

    .assign-input-row input[type="email"]:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 10%, transparent);
    }

    .assign-modal-msg {
      font-family: var(--font-body);
      font-size: 0.82rem;
      min-height: 1.2em;
      margin-top: var(--space-2);
    }

    .assign-remove-btn {
      padding: var(--space-2) var(--space-3);
      border: 1px solid #ff6b6b;
      border-radius: var(--radius-sm);
      background: transparent;
      color: #ff6b6b;
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .assign-remove-btn:hover { background: color-mix(in srgb, #ff6b6b 15%, transparent); }

    /* Contributors list */
    .cm-list {
      display: flex;
      flex-direction: column;
      gap: var(--space-1);
      margin-bottom: var(--space-3);
      max-height: 180px;
      overflow-y: auto;
    }

    .cm-item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-2) var(--space-3);
      background: color-mix(in srgb, var(--color-primary) 5%, var(--color-dark-900));
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 0.82rem;
    }

    .cm-item-email { flex: 1; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .cm-item-remove {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid #ff6b6b;
      border-radius: var(--radius-sm);
      color: #ff6b6b;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 2px 7px;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.15s;
    }

    .cm-item-remove:hover { background: #ff6b6b; color: var(--color-dark-900); }

    /* Admin: registered users panel */
    .admin-users-panel {
      margin-top: var(--space-6);
      padding: var(--space-5) var(--space-6);
      border: 1px solid color-mix(in srgb, var(--color-primary) 20%, transparent);
      border-radius: var(--radius-md);
      background: color-mix(in srgb, var(--color-primary) 3%, var(--color-dark-900));
    }

    .admin-users-panel h2 {
      font-family: var(--font-heading);
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 var(--space-4) 0;
      letter-spacing: 0.06em;
    }

    .users-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-body);
      font-size: 0.85rem;
    }

    .users-table th {
      text-align: left;
      color: var(--text-muted);
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0 var(--space-3) var(--space-2);
      border-bottom: 1px solid color-mix(in srgb, var(--color-primary) 20%, transparent);
    }

    .users-table th:last-child { text-align: right; }

    .users-table td {
      padding: var(--space-2) var(--space-3);
      color: var(--text-main);
      border-bottom: 1px solid color-mix(in srgb, var(--color-primary) 8%, transparent);
    }

    .users-table td:last-child {
      color: var(--color-primary);
      text-align: right;
      font-weight: 600;
    }

    .users-table tr:last-child td { border-bottom: none; }

    .users-empty {
      font-family: var(--font-body);
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0;
    }

    .cm-empty {
      text-align: center;
      padding: var(--space-3);
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.82rem;
      font-style: italic;
    }

    @media (max-width: 640px) {
      .albums-header-inner {
        flex-wrap: wrap;
        gap: var(--space-2);
      }
      .albums-header h1 {
        font-size: 1.8rem;
        flex: 0 0 100%;
      }
      .albums-header-inner > a.btn,
      #auth-header-action {
        flex: 1 1 auto;
        text-align: center;
        justify-content: center;
        min-height: 44px;
      }
      #auth-header-action .btn {
        width: 100%;
        text-align: center;
        display: flex;
        justify-content: center;
        min-height: 44px;
      }
      .albums-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: var(--space-3);
      }
      .album-cover {
        height: 120px;
      }
      /* Drag handle hidden on touch */
      .album-drag-handle {
        display: none;
      }
    }
  </style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="header-inner">
    <a aria-label="Who's to Say ? Foundation Home" class="brand" href="/">
      <img alt="Who's to Say ? Foundation logo (dark)" class="brand-logo logo-dark" src="/assets/images/logo-white-dark.png"/>
      <img alt="Who's to Say ? Foundation logo (light)" class="brand-logo logo-light" src="/assets/images/logo-black-light.png"/>
    </a>
    <nav aria-label="Primary navigation" class="site-nav">
      <a class="nav-link" data-nav="home" href="/">Home</a>
      <a class="nav-link" href="/programs.html">Programs</a>
      <a class="nav-link" href="/contact.html">Contact</a>
    </nav>
    <div class="header-actions">
      <button aria-label="Toggle theme" aria-pressed="false" class="theme-toggle" type="button"></button>
    </div>
  </div>
</header>

<main id="main">
  <div class="albums-header">
    <div class="albums-header-inner">
      <h1 id="gallery-title">Photo Albums</h1>
      <a href="/multi-slideshow.html" class="btn btn-primary" style="background: color-mix(in srgb, #a855f7 20%, transparent); border-color: #a855f7; color: #a855f7; white-space: nowrap;">🎬 Multi Slideshow</a>
      <div id="auth-header-action"><a href="/login.html" class="btn btn-primary">Sign In</a></div>
    </div>
  </div>

  <!-- Assign Owner Modal (admin only) -->
  <div id="assign-owner-modal" class="assign-modal" role="dialog" aria-modal="true">
    <div class="assign-modal-inner">
      <button class="assign-modal-close" id="ao-close" aria-label="Close">&times;</button>
      <h2>Assign Owner</h2>
      <p class="assign-modal-subtitle" id="ao-subtitle"></p>
      <div class="assign-info-row">
        <span class="assign-info-label">Current:</span>
        <span class="assign-info-value" id="ao-current">Unassigned</span>
        <button class="assign-remove-btn" id="ao-remove-btn">Remove</button>
      </div>
      <div class="assign-input-row">
        <input type="email" id="ao-email" list="known-users-datalist" placeholder="user@example.com" />
        <button class="btn btn-primary" id="ao-assign-btn" style="white-space:nowrap">Assign</button>
      </div>
      <p class="assign-modal-msg" id="ao-msg"></p>
    </div>
  </div>

  <!-- Manage Contributors Modal (admin only) -->
  <div id="contributors-modal" class="assign-modal" role="dialog" aria-modal="true">
    <div class="assign-modal-inner">
      <button class="assign-modal-close" id="cm-close" aria-label="Close">&times;</button>
      <h2>Contributors</h2>
      <p class="assign-modal-subtitle" id="cm-subtitle"></p>
      <div id="cm-list" class="cm-list"></div>
      <div class="assign-input-row">
        <input type="email" id="cm-email" list="known-users-datalist" placeholder="Add contributor by email" />
        <button class="btn btn-primary" id="cm-add-btn" style="white-space:nowrap">Add</button>
      </div>
      <p class="assign-modal-msg" id="cm-msg"></p>
    </div>
  </div>

  <datalist id="known-users-datalist"></datalist>

  <div class="albums-container">
    <div class="albums-grid" id="albums-grid">
      <div id="albums-empty" class="albums-empty" style="grid-column: 1 / -1;">
        <p>Loading albums...</p>
      </div>
    </div>

    <div id="create-album-section" class="create-album-section" style="display: none;">
      <h2>Create New Album</h2>
      <p>Start a new collection of photos</p>
      <form id="create-album-form" class="album-form">
        <input id="album-name-input" type="text" placeholder="Album name" required />
        <button type="submit" class="btn btn-primary">Create Album</button>
      </form>
      <div id="create-message"></div>
    </div>

    <div id="admin-users-panel" class="admin-users-panel" style="display:none">
      <h2>Registered Users</h2>
      <div id="admin-users-list"><p class="users-empty">Loading…</p></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  © <span id="year"></span> Who's to Say ? Foundation
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script type="module" src="/js/albums-index.js"></script>
</body>
</html>
