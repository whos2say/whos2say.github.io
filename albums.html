<!doctype html>
<html data-theme="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Photo Albums</title>
  <link href="/assets/css/styles.css" rel="stylesheet" />
  <script src="/assets/js/theme.js" defer></script>
  <style>
    .albums-header {
      padding: var(--space-6) var(--space-3);
      margin-bottom: var(--space-5);
      border-bottom: 1px solid color-mix(in srgb, var(--color-primary) 15%, transparent);
    }

    .albums-header-inner {
      max-width: var(--max-width);
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-4);
    }

    .albums-header h1 {
      font-family: var(--font-heading);
      font-size: 2.5rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin: 0;
      flex: 1;
    }

    .albums-container {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 0 var(--space-3) var(--space-6);
    }

    .albums-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--space-4);
    }

    .album-card {
      background: color-mix(in srgb, var(--color-dark-800) 95%, transparent);
      border: 1px solid color-mix(in srgb, var(--color-primary) 20%, transparent);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-lg);
      transition: all 0.18s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      animation: fadeInScale 0.6s ease both;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .album-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 24px 60px rgba(99, 245, 239, 0.15);
      border-color: color-mix(in srgb, var(--color-primary) 40%, transparent);
    }

    .album-cover {
      width: 100%;
      height: 160px;
      background: var(--color-dark-900);
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .album-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .album-card:hover .album-cover img {
      transform: scale(1.05);
    }

    .album-cover-placeholder {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, color-mix(in srgb, var(--color-primary) 10%, var(--color-dark-900)), color-mix(in srgb, var(--color-primary) 5%, var(--color-dark-800)));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 2rem;
    }

    .album-info {
      padding: var(--space-4);
    }

    .album-card h3 {
      font-family: var(--font-heading);
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin: 0 0 var(--space-2) 0;
      word-break: break-word;
    }

    .album-card p {
      font-family: var(--font-body);
      font-size: 0.9rem;
      color: var(--text-muted);
      margin: 0 0 var(--space-3) 0;
      flex: 1;
    }

    .album-card a {
      color: var(--color-primary);
      text-decoration: none;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 0.95rem;
      transition: color 0.18s ease;
    }

    .album-card a:hover {
      color: #a0fdf9;
    }

    .albums-empty {
      text-align: center;
      padding: var(--space-8) var(--space-3);
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .albums-empty p {
      font-size: 1.1rem;
      margin-bottom: var(--space-4);
    }

    .create-album-section {
      margin-top: var(--space-8);
      padding: var(--space-6);
      border: 2px dashed color-mix(in srgb, var(--color-primary) 30%, transparent);
      border-radius: var(--radius-md);
      text-align: center;
      background: color-mix(in srgb, var(--color-primary) 3%, var(--color-dark-900));
    }

    .create-album-section h2 {
      font-family: var(--font-heading);
      font-size: 1.3rem;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: var(--space-3);
    }

    .create-album-section p {
      font-family: var(--font-body);
      color: var(--text-muted);
      margin-bottom: var(--space-4);
    }

    .album-form {
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
    }

    .album-form input {
      padding: var(--space-2) var(--space-3);
      border: 1px solid color-mix(in srgb, var(--color-primary) 30%, transparent);
      border-radius: var(--radius-sm);
      background: color-mix(in srgb, var(--color-dark-900) 95%, transparent);
      color: var(--text-main);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: all 0.18s ease;
    }

    .album-form input:focus {
      outline: none;
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--color-primary) 10%, transparent);
    }

    .album-form input::placeholder {
      color: var(--text-muted);
    }

    .album-form button {
      margin-top: var(--space-2);
    }

    .album-delete-btn {
      margin-top: var(--space-2);
      width: 100%;
      padding: var(--space-2) var(--space-3);
      background: color-mix(in srgb, #ff6b6b 10%, transparent);
      border: 1px solid #ff6b6b;
      border-radius: var(--radius-sm);
      color: #ff6b6b;
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s ease;
      text-transform: uppercase;
    }

    .album-delete-btn:hover {
      background: #ff6b6b;
      color: var(--color-dark-900);
    }

    .btn-create-first {
      margin-top: var(--space-4);
      font-size: 1.1rem;
      padding: var(--space-3) var(--space-6);
    }

    .title-size-btns {
      display: flex;
      gap: 3px;
      align-items: center;
      flex-shrink: 0;
    }

    .title-size-btn {
      width: 26px;
      height: 26px;
      border-radius: var(--radius-sm);
      border: 1px solid color-mix(in srgb, var(--color-primary) 25%, transparent);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.72rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .title-size-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      background: color-mix(in srgb, var(--color-primary) 10%, transparent);
    }

    .title-size-btn.active {
      border-color: var(--color-primary);
      background: color-mix(in srgb, var(--color-primary) 20%, transparent);
      color: var(--color-primary);
    }

    /* ── Album drag-to-reorder (admin only) ── */
    .album-card.dragging {
      opacity: 0.35;
      transform: scale(0.96);
    }

    .album-card.drag-over {
      border-color: var(--color-primary) !important;
      box-shadow: 0 0 24px color-mix(in srgb, var(--color-primary) 40%, transparent) !important;
      transform: translateY(-4px) scale(1.02);
    }

    .album-drag-handle {
      position: absolute;
      bottom: var(--space-2);
      right: var(--space-2);
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      cursor: grab;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.15s;
      user-select: none;
      background: rgba(0,0,0,0.4);
      border-radius: var(--radius-sm);
      padding: 2px 5px;
      letter-spacing: -1px;
    }

    .album-card:hover .album-drag-handle {
      opacity: 1;
    }

    @media (max-width: 640px) {
      .albums-header-inner {
        flex-wrap: wrap;
        gap: var(--space-3);
      }
      .albums-header h1 {
        font-size: 1.8rem;
        flex: 0 0 100%;
      }
      .albums-header-inner > a.btn,
      #auth-header-action {
        flex: 1 1 auto;
      }
      #auth-header-action .btn {
        width: 100%;
        text-align: center;
        display: block;
      }
      .albums-grid {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: var(--space-3);
      }
      .album-cover {
        height: 120px;
      }
    }
  </style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>
<header class="site-header">
  <div class="header-inner">
    <a aria-label="Who's to Say ? Foundation Home" class="brand" href="/">
      <img alt="Who's to Say ? Foundation logo (dark)" class="brand-logo logo-dark" src="/assets/images/logo-white-dark.png"/>
      <img alt="Who's to Say ? Foundation logo (light)" class="brand-logo logo-light" src="/assets/images/logo-black-light.png"/>
    </a>
    <nav aria-label="Primary navigation" class="site-nav">
      <a class="nav-link" data-nav="home" href="/">Home</a>
      <a class="nav-link" href="/programs.html">Programs</a>
      <a class="nav-link" href="/contact.html">Contact</a>
    </nav>
    <div class="header-actions">
      <button aria-label="Toggle theme" aria-pressed="false" class="theme-toggle" type="button"></button>
    </div>
  </div>
</header>

<main id="main">
  <div class="albums-header">
    <div class="albums-header-inner">
      <h1 id="gallery-title">Photo Albums</h1>
      <a href="/multi-slideshow.html" class="btn btn-primary" style="background: color-mix(in srgb, #a855f7 20%, transparent); border-color: #a855f7; color: #a855f7; white-space: nowrap;">🎬 Multi Slideshow</a>
      <div id="auth-header-action"><a href="/login.html" class="btn btn-primary">Sign In</a></div>
    </div>
  </div>

  <div class="albums-container">
    <div class="albums-grid" id="albums-grid">
      <div id="albums-empty" class="albums-empty" style="grid-column: 1 / -1;">
        <p>Loading albums...</p>
      </div>
    </div>

    <div id="create-album-section" class="create-album-section" style="display: none;">
      <h2>Create New Album</h2>
      <p>Start a new collection of photos</p>
      <form id="create-album-form" class="album-form">
        <input id="album-name-input" type="text" placeholder="Album name" required />
        <button type="submit" class="btn btn-primary">Create Album</button>
      </form>
      <div id="create-message"></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  © <span id="year"></span> Who's to Say ? Foundation
</footer>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

<script type="module" src="/js/albums-index.js"></script>
</body>
</html>
