<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Galleries | DJR Photography</title>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<meta content="Browse DJR Photography galleries." name="description"/>
<meta content="index,follow" name="robots"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Archivo+Black&amp;display=swap" rel="stylesheet"/>
<link href="/djr/assets/djr.css" rel="stylesheet"/>
</head>
<body class="djr" data-djr-page="galleries">
<a class="skip-link" href="#main">Skip to content</a>
<header class="djr-header">
  <div class="djr-header-inner">
    <a aria-label="DJR Photography Home" class="djr-brand" href="/djr/">
      <span class="djr-wordmark">DJR</span>
      <span class="djr-brand-sub">David J. Richards Photography</span>
    </a>
    <button aria-controls="djr-nav" aria-expanded="false" aria-label="Toggle navigation" class="djr-nav-toggle" type="button">Menu</button>
    <nav aria-label="Primary navigation" class="djr-nav" id="djr-nav"></nav>
    <a class="djr-btn djr-header-cta" href="/djr/contact.html">Book a Session</a>
  </div>
</header>
<main id="main">
  <section class="djr-page-hero">
    <div class="djr-container">
      <p class="djr-eyebrow">Portfolio</p>
      <h1 class="djr-h2">Galleries</h1>
      <p>Browse David's work by story category. Each card can open the full Photo Gallery App viewer or a shared Google Photos album.</p>
    </div>
  </section>
  <section class="djr-section" style="padding-top:0">
    <div class="djr-container">
      <div aria-label="Filter galleries by category" class="djr-filters" id="djr-filters" role="group"></div>
      <p class="djr-gallery-status" id="djr-gallery-status">Loading galleries...</p>
      <div class="djr-gallery-grid" id="djr-gallery-grid"></div>
    </div>
  </section>
</main>
<footer class="djr-footer"></footer>
<script defer src="/djr/js/djr-content.js"></script>
<script type="module" src="/djr/js/public-participant-profile.js"></script>
<script src="/djr/js/djr-galleries.js" type="module"></script>
</body>
</html>
